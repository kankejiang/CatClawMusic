<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>猫爪音乐 · 横屏 / Windows 播放页原型</title>
<style>
  :root {
    --primary: #8C7BFF;
    --primary-2: #55D6FF;
    --accent-glow: rgba(140, 123, 255, 0.55);
    --bg-0: #020617;
    --bg-1: #0a1530;
    --text: #FFFFFF;
    --text-2: rgba(255, 255, 255, 0.72);
    --text-3: rgba(255, 255, 255, 0.46);
    --border: rgba(255, 255, 255, 0.10);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #000;
    font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    color: var(--text);
    overflow: hidden;
    user-select: none;
  }

  /* Deep blue dashboard background with dotted aurora */
  body::before {
    content: "";
    position: fixed; inset: 0;
    background:
      radial-gradient(1200px 700px at 20% 10%, rgba(60, 80, 180, 0.45), transparent 65%),
      radial-gradient(900px 600px at 85% 90%, rgba(85, 214, 255, 0.18), transparent 60%),
      radial-gradient(600px 400px at 70% 20%, rgba(140, 123, 255, 0.22), transparent 55%),
      linear-gradient(160deg, #03081c 0%, #06102e 50%, #020617 100%);
    z-index: 0;
  }
  body::after {
    content: "";
    position: fixed; inset: 0;
    background-image:
      radial-gradient(circle, rgba(255,255,255,0.10) 1px, transparent 1px);
    background-size: 22px 22px;
    mask-image: radial-gradient(ellipse at 30% 30%, #000 0%, transparent 70%);
    -webkit-mask-image: radial-gradient(ellipse at 30% 30%, #000 0%, transparent 70%);
    opacity: 0.35;
    z-index: 0;
  }

  .window {
    position: relative; z-index: 1;
    width: min(1200px, 98vw);
    height: min(720px, 96vh);
    margin: 2vh auto;
    border-radius: 24px;
    background: rgba(6, 14, 38, 0.35);
    border: 1px solid var(--border);
    box-shadow: 0 40px 100px rgba(0,0,0,0.65);
    display: flex; flex-direction: column; overflow: hidden;
    backdrop-filter: blur(6px);
  }

  /* ===== Top status bar ===== */
  .statusbar {
    height: 52px; flex: 0 0 52px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px;
  }
  .back {
    width: 40px; height: 40px; border-radius: 50%;
    display: grid; place-items: center; font-size: 20px; color: var(--text-2);
    cursor: pointer; transition: all 0.15s;
  }
  .back:hover { background: rgba(255,255,255,0.08); color: var(--text); }
  .sys-icons { display: flex; align-items: center; gap: 18px; font-size: 15px; color: var(--text-2); }
  .sys-icons .time { font-size: 16px; font-weight: 600; letter-spacing: 0.5px; color: var(--text); }

  /* ===== Main stage (left cover + right info/lyrics) ===== */
  .main-stage {
    flex: 1; min-height: 0;
    display: grid;
    grid-template-columns: 1fr 1.15fr;
    align-items: center;
    padding: 0 54px 16px;
    gap: 40px;
  }

  /* Left: album disc */
  .cover-panel { display: grid; place-items: center; }
  .disc-wrap {
    position: relative; width: min(420px, 36vw); aspect-ratio: 1 / 1;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, rgba(140,123,255,0.35), transparent 60%),
                radial-gradient(circle at 70% 70%, rgba(85,214,255,0.25), transparent 55%),
                linear-gradient(135deg, #1a2452, #0c1838);
    box-shadow:
      0 30px 80px rgba(0,0,0,0.45),
      0 0 80px rgba(140,123,255,0.25),
      inset 0 0 0 12px rgba(255,255,255,0.04);
    display: grid; place-items: center;
    animation: rotateDisc 20s linear infinite;
  }
  .disc-wrap.paused { animation-play-state: paused; }
  .disc-wrap::before {
    content: "";
    position: absolute; inset: 10%;
    border-radius: 50%;
    background:
      radial-gradient(circle at 30% 30%, rgba(140,123,255,0.9), transparent 55%),
      radial-gradient(circle at 75% 75%, rgba(85,214,255,0.85), transparent 55%),
      linear-gradient(135deg, #2d2468, #102344);
  }
  .disc-wrap::after {
    content: "";
    position: absolute; width: 18%; height: 18%;
    border-radius: 50%;
    background: rgba(8, 11, 26, 0.85);
    border: 2px solid rgba(255,255,255,0.12);
  }
  @keyframes rotateDisc { to { transform: rotate(360deg); } }

  /* Right: track info / controls / lyrics */
  .info-panel { display: flex; flex-direction: column; min-height: 0; }
  .player-info { display: flex; flex-direction: column; gap: 22px; }

  .track-title {
    font-size: 46px; font-weight: 800; letter-spacing: 0.5px;
    line-height: 1.1; text-shadow: 0 4px 30px rgba(0,0,0,0.5);
  }
  .artist-line { display: flex; align-items: center; gap: 14px; margin-top: 4px; }
  .artist { font-size: 18px; color: var(--text-2); }
  .badges { display: flex; gap: 8px; }
  .badge {
    font-size: 10px; font-weight: 700; padding: 3px 7px; border-radius: 5px;
    border: 1px solid rgba(255,255,255,0.25); color: var(--text-2); letter-spacing: 0.5px;
  }
  .tool-icons { display: flex; gap: 16px; margin-top: -6px; }
  .tool-icons .tico {
    width: 34px; height: 34px; border-radius: 10px; border: 1px solid var(--border);
    display: grid; place-items: center; font-size: 15px; color: var(--text-2);
    cursor: pointer; transition: all 0.15s;
  }
  .tool-icons .tico:hover { background: rgba(255,255,255,0.08); color: var(--text); }

  .progress-area { width: 100%; max-width: 560px; }
  .progress-bar {
    height: 5px; border-radius: 3px; background: rgba(255,255,255,0.12);
    position: relative; overflow: hidden; cursor: pointer;
  }
  .progress-bar .fill {
    position: absolute; left: 0; top: 0; bottom: 0; width: 42%;
    background: linear-gradient(90deg, var(--primary), var(--primary-2));
    box-shadow: 0 0 18px var(--accent-glow);
  }
  .progress-bar .glow {
    position: absolute; left: 42%; top: 50%; transform: translate(-50%, -50%);
    width: 12px; height: 12px; border-radius: 50%; background: #fff;
    box-shadow: 0 0 14px rgba(255,255,255,0.8);
  }
  .times { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-3); margin-top: 8px; }

  .control-row {
    display: flex; align-items: center; gap: 18px;
    margin-top: 4px;
  }
  .c-btn {
    width: 54px; height: 54px; border-radius: 50%;
    display: grid; place-items: center; font-size: 22px; color: var(--text-2);
    cursor: pointer; transition: all 0.15s;
    border: 1px solid transparent;
  }
  .c-btn:hover { color: var(--text); transform: translateY(-2px); }
  .c-btn.play {
    width: 80px; height: 80px; font-size: 32px; color: #fff;
    background: linear-gradient(135deg, var(--primary), var(--primary-2));
    box-shadow: 0 0 36px var(--accent-glow);
  }
  .c-btn.play:hover { transform: scale(1.05); }
  .c-btn.active { color: var(--primary-2); border-color: rgba(85,214,255,0.35); background: rgba(85,214,255,0.08); }
  .c-btn.lyric-toggle { font-size: 15px; font-weight: 700; width: 46px; height: 46px; }

  .current-lyric { text-align: left; max-width: 560px; margin-bottom: 14px; cursor: pointer; }
  .current-lyric .cl-label { font-size: 11px; color: var(--text-3); letter-spacing: 2px; margin-bottom: 8px; }
  .current-lyric .cl-line {
    font-size: 19px; font-weight: 600; color: var(--text);
    text-shadow: 0 0 18px var(--accent-glow); line-height: 1.45;
    transition: opacity 0.35s; min-height: 27px;
  }

  /* ===== Lyrics panel (replaces player-info on the right) ===== */
  .lyrics-panel {
    flex: 1; min-height: 0; display: none;
    flex-direction: column; padding: 4px 0 12px;
    animation: lpIn 0.3s ease;
  }
  .lyrics-panel.show { display: flex; }
  @keyframes lpIn { from { opacity: 0; } to { opacity: 1; } }
  .lp-head { margin-bottom: 14px; }
  .lp-head .lp-label { font-size: 12px; color: var(--text-3); letter-spacing: 2px; }
  .lp-scroll {
    flex: 1; min-height: 0; overflow: hidden;
    display: flex; flex-direction: column; gap: 22px;
    align-items: flex-start; justify-content: center;
    transition: transform 0.5s cubic-bezier(.22,.61,.36,1);
    mask-image: linear-gradient(to bottom, transparent, #000 18%, #000 82%, transparent);
    -webkit-mask-image: linear-gradient(to bottom, transparent, #000 18%, #000 82%, transparent);
  }
  .lp-line { font-size: 18px; color: var(--text-3); line-height: 1.4; transition: all 0.3s; text-align: left; }
  .lp-line.active { font-size: 28px; font-weight: 700; color: #fff; text-shadow: 0 0 22px var(--accent-glow); }
  .lp-line.near { color: var(--text-2); }
  .lp-hint { text-align: left; font-size: 12px; color: var(--text-3); letter-spacing: 1px; margin-top: 14px; }

  .note { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); z-index: 9; font-size: 11px; color: var(--text-3); background: rgba(0,0,0,0.45); padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); }
</style>
</head>
<body>
  <div class="window">
    <!-- Top status bar -->
    <div class="statusbar">
      <div class="back">←</div>
      <div class="sys-icons">
        <span>🌐</span>
        <span>📶</span>
        <span>🔋</span>
        <span class="time">06:30</span>
      </div>
    </div>

    <!-- Main stage: left cover, right info/lyrics -->
    <div class="main-stage" id="mainStage">
      <div class="cover-panel">
        <div class="disc-wrap" id="disc"></div>
      </div>

      <div class="info-panel">
        <!-- Player info (hidden when lyrics mode) -->
        <div class="player-info" id="playerInfo">
          <div>
            <div class="track-title">星河漫游</div>
            <div class="artist-line">
              <span class="artist">猫爪乐队</span>
              <span class="badges">
                <span class="badge">Hi-Res</span>
                <span class="badge">无损</span>
              </span>
            </div>
          </div>

          <div class="tool-icons">
            <div class="tico" title="播放列表">☰</div>
            <div class="tico" title="睡眠定时">🌙</div>
            <div class="tico" title="竖屏切换">🔄</div>
          </div>

          <div class="current-lyric">
            <div class="cl-label">当前歌词</div>
            <div class="cl-line" id="clLine">乘着星河慢慢地漂流</div>
          </div>

          <div class="progress-area">
            <div class="progress-bar">
              <div class="fill"></div>
              <div class="glow"></div>
            </div>
            <div class="times"><span>01:42</span><span>04:05</span></div>
          </div>

          <div class="control-row">
            <div class="c-btn active" title="已收藏">♥</div>
            <div class="c-btn" title="上一首">⏮</div>
            <div class="c-btn play" id="playBtn" title="播放/暂停" onclick="togglePlay()">⏸</div>
            <div class="c-btn" title="下一首">⏭</div>
            <div class="c-btn active" title="随机播放">🔀</div>
            <div class="c-btn lyric-toggle active" id="lyricToggle" title="歌词" onclick="toggleLyrics()">词</div>
          </div>
        </div>

        <!-- Lyrics panel (shown when lyrics mode) -->
        <div class="lyrics-panel" id="lyricsPanel">
          <div class="lp-head">
            <span class="lp-label">歌词</span>
          </div>
          <div class="lp-scroll" id="lpScroll"></div>
          <div class="lp-hint">点击任意处返回播放页</div>
        </div>
      </div>
    </div>
  </div>

  <div class="note">横屏 / Windows 播放页原型 · 左封面 / 右信息+控制 · 点「词」右侧切换为歌词 · DeepSpace 品牌</div>

<script>
  let playing = true;
  function togglePlay() {
    playing = !playing;
    document.getElementById('playBtn').textContent = playing ? '⏸' : '▶';
    document.getElementById('disc').classList.toggle('paused', !playing);
  }

  // ===== Lyrics (mini current line + lyrics panel on the right) =====
  const lyricLines = [
    "夜色漫过城市的边缘", "我把心事折成纸船", "乘着星河慢慢地漂流",
    "光年之外谁在等候", "霓虹融进深海的蓝", "风把名字轻轻念出口",
    "我们终将在银河重逢", "像两颗星彼此拥有", "时间停在这温柔的秋",
    "梦里有你就不算远游"
  ];
  let clIdx = 2;
  const clEl = document.getElementById('clLine');
  const lyricToggleEl = document.getElementById('lyricToggle');
  const playerInfoEl = document.getElementById('playerInfo');
  const lyricsPanelEl = document.getElementById('lyricsPanel');
  const lpScroll = document.getElementById('lpScroll');

  // Build lyrics line nodes once
  const lpNodes = lyricLines.map(t => {
    const d = document.createElement('div');
    d.className = 'lp-line';
    d.textContent = t;
    lpScroll.appendChild(d);
    return d;
  });

  function refreshLyrics() {
    // mini current line
    clEl.textContent = lyricLines[clIdx];
    // lyrics panel highlight + auto scroll
    lpNodes.forEach((n, i) => {
      n.classList.toggle('active', i === clIdx);
      n.classList.toggle('near', Math.abs(i - clIdx) === 1);
    });
    if (lyricsPanelEl.classList.contains('show')) {
      const node = lpNodes[clIdx];
      const offset = node.offsetTop - lpScroll.clientHeight / 2 + node.clientHeight / 2;
      lpScroll.style.transform = `translateY(${-offset}px)`;
    }
  }

  function toggleLyrics() {
    const showing = lyricsPanelEl.classList.contains('show');
    if (showing) {
      lyricsPanelEl.classList.remove('show');
      playerInfoEl.style.display = 'flex';
      lyricToggleEl.classList.remove('active');
    } else {
      lyricsPanelEl.classList.add('show');
      playerInfoEl.style.display = 'none';
      lyricToggleEl.classList.add('active');
      refreshLyrics();
    }
  }
  // click current lyric line also opens lyrics mode
  clEl.addEventListener('click', toggleLyrics);
  // click anywhere on the lyrics panel returns to the player
  lyricsPanelEl.addEventListener('click', toggleLyrics);

  setInterval(() => {
    if (!playing) return;
    clEl.style.opacity = 0;
    setTimeout(() => {
      clIdx = (clIdx + 1) % lyricLines.length;
      clEl.style.opacity = 1;
      refreshLyrics();
    }, 250);
  }, 2800);

  refreshLyrics();
</script>
</body>
</html>
