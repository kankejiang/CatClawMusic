<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>均衡器 · 弹窗原型（增强版）</title>
<style>
  :root{
    --bg:#080B1A; --c1:#8C7BFF; --c2:#55D6FF; --txt:#EAF0FF; --sub:#9AA6C8;
    --glass:rgba(255,255,255,0.06); --glass-strong:rgba(255,255,255,0.10);
    --stroke:rgba(255,255,255,0.14); --stroke-soft:rgba(255,255,255,0.08);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",Segoe UI,sans-serif;
    background:radial-gradient(120% 120% at 20% 0%, #161A33 0%, var(--bg) 55%);
    color:var(--txt);height:100vh;display:flex;align-items:center;justify-content:center;}
  .phone{position:relative;width:390px;height:844px;border-radius:46px;background:#05070F;
    padding:14px;box-shadow:0 40px 90px rgba(0,0,0,.6), inset 0 0 0 2px rgba(255,255,255,.05);}
  .screen{position:relative;width:100%;height:100%;border-radius:34px;overflow:hidden;
    background:linear-gradient(180deg,#0A0E20 0%, #080B1A 100%);}

  .player{position:absolute;inset:0;
    background:radial-gradient(80% 50% at 50% 12%, rgba(140,123,255,.30), transparent 60%),
      radial-gradient(70% 50% at 80% 80%, rgba(85,214,255,.18), transparent 60%),
      linear-gradient(180deg,#0C1126,#080B1A);transition:.25s;}
  .player .cover{position:absolute;top:150px;left:55px;width:280px;height:280px;border-radius:26px;
    background:linear-gradient(135deg,var(--c1),var(--c2));box-shadow:0 30px 60px rgba(140,123,255,.35);}
  .player .title{position:absolute;top:470px;left:0;right:0;text-align:center;font-size:22px;font-weight:700;}
  .player .artist{position:absolute;top:504px;left:0;right:0;text-align:center;font-size:14px;color:var(--sub);}
  .player .ctrls{position:absolute;bottom:120px;left:0;right:0;display:flex;justify-content:center;gap:40px;align-items:center;}
  .player .ctrls .c{width:54px;height:54px;border-radius:50%;background:var(--glass);border:1px solid var(--stroke);display:flex;align-items:center;justify-content:center;font-size:20px;}
  .player .ctrls .play{width:68px;height:68px;background:linear-gradient(135deg,var(--c1),var(--c2));color:#080B1A;border:none;font-size:26px;}
  .player .topbar{position:absolute;top:54px;left:0;right:0;display:flex;justify-content:space-between;padding:0 30px;font-size:13px;color:var(--sub);}
  .player.dim{filter:blur(6px) brightness(.5);transform:scale(1.04);}

  .scrim{position:absolute;inset:0;background:rgba(4,6,14,.55);opacity:0;pointer-events:none;transition:.25s;}
  .scrim.show{opacity:1;pointer-events:auto;}

  .sheet{position:absolute;left:8px;right:8px;bottom:8px;border-radius:30px 30px 26px 26px;
    background:rgba(18,22,44,.74);border:1px solid var(--stroke);
    backdrop-filter:blur(26px);-webkit-backdrop-filter:blur(26px);
    box-shadow:0 -10px 60px rgba(0,0,0,.5);padding:14px 16px 18px;
    max-height:92%;overflow-y:auto;transform:translateY(110%);opacity:0;pointer-events:none;
    transition:.3s cubic-bezier(.2,.8,.2,1);}
  .sheet.show{transform:translateY(0);opacity:1;pointer-events:auto;}
  .sheet::-webkit-scrollbar{width:0;}
  .grip{width:38px;height:4px;border-radius:3px;background:rgba(255,255,255,.2);margin:2px auto 12px;}
  .sh-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .sh-head .t{font-size:17px;font-weight:700;}
  .sh-head .x{width:28px;height:28px;border-radius:50%;background:var(--glass);border:1px solid var(--stroke-soft);
    color:var(--sub);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;}

  /* 主开关 */
  .master{display:flex;align-items:center;justify-content:space-between;background:var(--glass);
    border:1px solid var(--stroke-soft);border-radius:14px;padding:10px 12px;margin-bottom:12px;}
  .master .mt{font-size:13px;font-weight:600;}
  .master .md{font-size:11px;color:var(--sub);margin-top:1px;}
  .toggle{width:46px;height:27px;border-radius:18px;background:rgba(255,255,255,.12);border:1px solid var(--stroke-soft);
    position:relative;cursor:pointer;flex:0 0 auto;transition:.2s;}
  .toggle::after{content:"";position:absolute;top:2px;left:2px;width:21px;height:21px;border-radius:50%;
    background:#cfd6ee;transition:.2s;}
  .toggle.on{background:linear-gradient(135deg,var(--c1),var(--c2));border-color:transparent;}
  .toggle.on::after{left:21px;background:#fff;}

  /* 频谱 */
  .analyzer{width:100%;height:58px;border-radius:14px;background:rgba(0,0,0,.25);
    border:1px solid var(--stroke-soft);margin-bottom:12px;display:block;}

  .sec-title{font-size:12px;color:var(--sub);margin:4px 2px 8px;display:flex;justify-content:space-between;}
  .sec-title .tip{color:rgba(154,166,200,.7);}

  .presets{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;}
  .presets::-webkit-scrollbar{display:none;}
  .preset{flex:0 0 auto;padding:8px 13px;border-radius:14px;font-size:13px;font-weight:600;
    background:var(--glass);border:1px solid var(--stroke-soft);color:var(--txt);cursor:pointer;transition:.16s;white-space:nowrap;}
  .preset:hover{background:var(--glass-strong);}
  .preset.active{background:linear-gradient(135deg,rgba(140,123,255,.4),rgba(85,214,255,.3));
    border-color:rgba(140,123,255,.6);box-shadow:0 6px 18px rgba(140,123,255,.25);}

  .eq-area{position:relative;height:184px;margin:4px 2px 6px;transition:.2s;}
  .eq-area.off{opacity:.35;filter:grayscale(.4);}
  .eq-area svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible;}
  .curve{fill:none;stroke:url(#eg);stroke-width:2.5;stroke-linejoin:round;stroke-linecap:round;
    filter:drop-shadow(0 0 6px rgba(140,123,255,.6));}
  .bands{position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:space-between;}
  .band{flex:1;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;}
  .slider{position:relative;width:100%;height:150px;display:flex;justify-content:center;cursor:pointer;}
  .track{position:absolute;left:50%;transform:translateX(-50%);bottom:0;width:6px;height:150px;border-radius:6px;background:rgba(255,255,255,.10);}
  .fill{position:absolute;left:50%;transform:translateX(-50%);bottom:0;width:6px;border-radius:6px;background:linear-gradient(180deg,var(--c2),var(--c1));}
  .handle{position:absolute;left:50%;transform:translate(-50%,50%);width:22px;height:22px;border-radius:50%;
    background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.5),0 0 0 4px rgba(140,123,255,.25);cursor:grab;touch-action:none;}
  .band .hz{font-size:10px;color:var(--sub);margin-top:6px;}
  .band .val{font-size:10px;color:var(--c2);margin-top:1px;font-weight:600;}

  /* 增强控件 */
  .enh{background:var(--glass);border:1px solid var(--stroke-soft);border-radius:16px;padding:6px 12px;margin-bottom:12px;}
  .erow{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.06);}
  .erow:last-child{border-bottom:none;}
  .erow .el{flex:0 0 76px;font-size:13px;font-weight:600;}
  .erow .ed{flex:0 0 0;font-size:11px;color:var(--sub);}
  .erow .spacer{flex:1;}
  .hslider{flex:1;position:relative;height:24px;display:flex;align-items:center;cursor:pointer;}
  .htrack{position:absolute;left:0;right:0;height:6px;border-radius:6px;background:rgba(255,255,255,.10);}
  .hfill{position:absolute;left:0;height:6px;border-radius:6px;background:linear-gradient(90deg,var(--c1),var(--c2));}
  .hhandle{position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;
    box-shadow:0 2px 6px rgba(0,0,0,.5);transform:translateX(-50%);cursor:grab;touch-action:none;}
  .eval{flex:0 0 42px;text-align:right;font-size:12px;color:var(--c2);font-weight:600;}

  .sh-foot{display:flex;gap:10px;margin-top:4px;}
  .btn{flex:1;height:48px;border-radius:14px;font-size:14px;font-weight:700;border:none;cursor:pointer;
    display:flex;align-items:center;justify-content:center;}
  .btn.primary{background:linear-gradient(135deg,var(--c1),var(--c2));color:#080B1A;box-shadow:0 10px 24px rgba(140,123,255,.4);}
  .btn.ghost{background:var(--glass);color:var(--txt);border:1px solid var(--stroke);flex:0 0 110px;}
</style>
</head>
<body>
  <div class="phone">
    <div class="screen">
      <div class="player" id="player">
        <div class="topbar"><span>正在播放</span><span>9:41</span></div>
        <div class="cover"></div>
        <div class="title">夜空的彼岸</div>
        <div class="artist">猫爪乐队</div>
        <div class="ctrls"><div class="c">‹‹</div><div class="c play">▶</div><div class="c">››</div></div>
      </div>

      <div class="scrim" id="scrim" onclick="closeSheet()"></div>

      <div class="sheet" id="sheet">
        <div class="grip"></div>
        <div class="sh-head">
          <div class="t">均衡器 <small style="font-size:11px;color:var(--sub);font-weight:400;">音效中心</small></div>
          <div class="x" onclick="closeSheet()">✕</div>
        </div>

        <div class="master">
          <div><div class="mt">图形均衡器</div><div class="md">开启后按下方频段调节</div></div>
          <div class="toggle on" id="masterTg" onclick="toggleMaster(this)"></div>
        </div>

        <canvas class="analyzer" id="analyzer"></canvas>

        <div class="sec-title">预设 <span class="tip">点击应用</span></div>
        <div class="presets" id="presets">
          <div class="preset" data-p="off">关闭</div>
          <div class="preset active" data-p="flat">原声</div>
          <div class="preset" data-p="pop">流行</div>
          <div class="preset" data-p="rock">摇滚</div>
          <div class="preset" data-p="classical">古典</div>
          <div class="preset" data-p="vocal">人声</div>
          <div class="preset" data-p="dance">舞曲</div>
          <div class="preset" data-p="bass">重低音</div>
          <div class="preset" data-p="electronic">电子</div>
          <div class="preset" data-p="piano">钢琴</div>
          <div class="preset" data-p="cinema">影院</div>
          <div class="preset" data-p="car">车载</div>
        </div>

        <div class="sec-title">频段增益 <span class="tip">−12 ~ +12 dB</span></div>
        <div class="eq-area" id="eqArea">
          <svg viewBox="0 0 340 184" preserveAspectRatio="none">
            <defs><linearGradient id="eg" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#8C7BFF"/><stop offset="100%" stop-color="#55D6FF"/></linearGradient></defs>
            <polyline class="curve" id="curve" points=""/>
          </svg>
          <div class="bands" id="bands"></div>
        </div>

        <div class="sec-title">音效增强</div>
        <div class="enh">
          <div class="erow">
            <div class="el">低音增强</div><div class="spacer"></div>
            <div class="hslider" id="bass" data-min="0" data-max="100" data-val="20"></div>
            <div class="eval" id="bassV">20</div>
          </div>
          <div class="erow">
            <div class="el">响度增益</div><div class="spacer"></div>
            <div class="hslider" id="loud" data-min="0" data-max="100" data-val="35"></div>
            <div class="eval" id="loudV">35</div>
          </div>
          <div class="erow">
            <div class="el">声场宽度</div><div class="spacer"></div>
            <div class="hslider" id="stage" data-min="0" data-max="100" data-val="50"></div>
            <div class="eval" id="stageV">50</div>
          </div>
          <div class="erow">
            <div class="el">左右平衡</div><div class="spacer"></div>
            <div class="hslider" id="balance" data-min="-100" data-max="100" data-val="0"></div>
            <div class="eval" id="balanceV">居中</div>
          </div>
          <div class="erow">
            <div class="el">空间音频</div><div class="ed">3D 环绕</div><div class="spacer"></div>
            <div class="toggle" id="spatialTg" onclick="tg(this)"></div>
          </div>
          <div class="erow">
            <div class="el">淡入淡出</div><div class="ed">曲目间 4s</div><div class="spacer"></div>
            <div class="toggle on" id="xfadeTg" onclick="tg(this)"></div>
          </div>
        </div>

        <div class="sh-foot">
          <button class="btn ghost" onclick="savePreset()">保存预设</button>
          <button class="btn primary" onclick="closeSheet()">应用</button>
        </div>
      </div>
    </div>
  </div>

<script>
  const BANDS=["60","150","400","1K","2.4K","6K","15K"];
  const MIN=-12, MAX=12, H=150;
  const presets={
    off:[0,0,0,0,0,0,0], flat:[0,0,0,0,0,0,0], pop:[4,3,1,0,-1,-1,-2], rock:[5,4,3,1,0,2,3],
    classical:[3,2,1,0,1,2,3], vocal:[-2,-1,2,4,4,2,0], dance:[6,5,1,0,0,2,4],
    bass:[8,6,4,1,0,-1,-2], electronic:[5,4,2,0,1,3,4], piano:[-1,0,2,4,3,1,-1],
    cinema:[4,3,2,1,2,3,5], car:[7,6,4,2,0,1,2]
  };
  const bandsEl=document.getElementById('bands'); const sliders=[];

  BANDS.forEach((hz,i)=>{
    const band=document.createElement('div');band.className='band';
    band.innerHTML=`<div class="slider" data-i="${i}"><div class="track"></div><div class="fill"></div><div class="handle"></div></div>
      <div class="hz">${hz}</div><div class="val">0</div>`;
    bandsEl.appendChild(band);
    const slider=band.querySelector('.slider'); slider._i=i; slider._v=0;
    slider._update=v=>{ v=Math.max(MIN,Math.min(MAX,v)); slider._v=v;
      const f=(v-MIN)/(MAX-MIN);
      slider.querySelector('.fill').style.height=(f*100)+'%';
      slider.querySelector('.handle').style.bottom=(f*100)+'%';
      band.querySelector('.val').textContent=(v>0?'+':'')+v; updateCurve(); };
    slider._update(0);
    slider.addEventListener('pointerdown',e=>startDrag(slider,e));
    sliders.push(slider);
  });

  let active=null;
  function startDrag(s,e){active=s;s.setPointerCapture?.(e.pointerId);moveDrag(e);}
  function moveDrag(e){ if(!active)return;
    const tr=active.querySelector('.track').getBoundingClientRect();
    let f=1-(e.clientY-tr.top)/tr.height; f=Math.max(0,Math.min(1,f));
    active._update(Math.round(MIN+(MAX-MIN)*f)); }
  window.addEventListener('pointermove',moveDrag);
  window.addEventListener('pointerup',()=>{if(active)markCustom();active=null;});

  function updateCurve(){ const area=document.getElementById('eqArea').getBoundingClientRect();
    const n=BANDS.length,pts=[];
    sliders.forEach((s,i)=>{ const x=(i+0.5)/n*area.width; const f=(s._v-MIN)/(MAX-MIN);
      const y=H-f*H+(184-H)/2; pts.push(x.toFixed(1)+','+y.toFixed(1)); });
    document.getElementById('curve').setAttribute('points',pts.join(' ')); }

  // 预设
  const presetEls=document.querySelectorAll('#presets .preset');
  presetEls.forEach(p=>p.addEventListener('click',()=>{ presetEls.forEach(x=>x.classList.remove('active')); p.classList.add('active');
    const a=presets[p.dataset.p]||[0,0,0,0,0,0,0]; sliders.forEach((s,i)=>s._update(a[i])); }));
  function markCustom(){ presetEls.forEach(x=>x.classList.remove('active')); }

  // 横向滑块
  function bindH(id,fmt){ const el=document.getElementById(id); const min=+el.dataset.min,max=+el.dataset.max;
    const fill=document.createElement('div');fill.className='hfill'; const h=document.createElement('div');h.className='hhandle';
    const tr=document.createElement('div');tr.className='htrack'; el.appendChild(tr);el.appendChild(fill);el.appendChild(h);
    const out=document.getElementById(id+'V'); let val=+el.dataset.val;
    function set(v){ v=Math.max(min,Math.min(max,v)); val=v; const f=(v-min)/(max-min);
      fill.style.width=(f*100)+'%'; h.style.left=(f*100)+'%'; out.textContent=fmt(v); }
    el._set=set; set(val);
    el.addEventListener('pointerdown',e=>{ const r=el.getBoundingClientRect();
      let f=(e.clientX-r.left)/r.width; f=Math.max(0,Math.min(1,f)); set(min+(max-min)*f);
      const mv=ev=>{const rr=el.getBoundingClientRect();let ff=(ev.clientX-rr.left)/rr.width;ff=Math.max(0,Math.min(1,ff));set(min+(max-min)*ff);};
      const up=()=>{window.removeEventListener('pointermove',mv);window.removeEventListener('pointerup',up);};
      window.addEventListener('pointermove',mv);window.addEventListener('pointerup',up); });
    return el; }
  bindH('bass',v=>v); bindH('loud',v=>v); bindH('stage',v=>v);
  bindH('balance',v=> v===0?'居中':(v<0?'L'+(-v):'R'+v));

  function tg(el){el.classList.toggle('on');}
  function toggleMaster(el){ el.classList.toggle('on');
    document.getElementById('eqArea').classList.toggle('off',!el.classList.contains('on')); }
  function savePreset(){ const p=document.createElement('div');p.className='preset active';p.textContent='我的预设';
    p.addEventListener('click',()=>{presetEls.forEach(x=>x.classList.remove('active'));p.classList.add('active');});
    document.getElementById('presets').appendChild(p); presetEls.forEach(x=>x.classList.remove('active')); p.classList.add('active'); }

  // 频谱动画
  const cv=document.getElementById('analyzer'); const ctx=cv.getContext('2d');
  function drawSpectrum(){ const dpr=window.devicePixelRatio||1; const w=cv.clientWidth,h=cv.clientHeight;
    if(cv.width!==w*dpr){cv.width=w*dpr;cv.height=h*dpr;} ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,w,h); const N=40,bw=w/N; const t=performance.now()/300;
    const g=ctx.createLinearGradient(0,0,w,0); g.addColorStop(0,'#8C7BFF');g.addColorStop(1,'#55D6FF');
    ctx.fillStyle=g; ctx.shadowColor='rgba(140,123,255,.7)';ctx.shadowBlur=8;
    for(let i=0;i<N;i++){ const base=Math.sin(t+i*0.4)*0.5+0.5; const noise=Math.abs(Math.sin(t*1.7+i*1.3))*0.6;
      const bh=Math.max(3,(base*0.5+noise*0.5)*h*0.92); ctx.fillRect(i*bw+1,h-bh,bw-2,bh); } }
  (function loop(){ drawSpectrum(); requestAnimationFrame(loop); })();

  openSheet();
  function openSheet(){ document.getElementById('player').classList.add('dim');
    document.getElementById('scrim').classList.add('show'); document.getElementById('sheet').classList.add('show');
    requestAnimationFrame(updateCurve); }
  function closeSheet(){ document.getElementById('player').classList.remove('dim');
    document.getElementById('scrim').classList.remove('show'); document.getElementById('sheet').classList.remove('show'); }
  window.addEventListener('resize',updateCurve);
</script>
</body>
</html>
