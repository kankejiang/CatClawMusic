<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>音乐库详情 · CatClaw Music 原型</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-0: #080B1A; --bg-1: #0B0D20; --bg-2: #15132E;
    --surface: #1A2040; --card: #182244; --card-strong: #1E2A52;
    --stroke: #2A3870; --stroke-strong: #3A4A8C;
    --primary: #8C7BFF; --primary-deep: #6250F6;
    --accent: #55D6FF; --like: #FF7AAE; --good: #7AF0C8;
    --text-1: #F7F8FF; --text-2: #C2C6E4; --text-3: #8D93B7;
    --chip-bg: #1C2850; --chip-active: #FF6C5CE7;
    --display: "Space Grotesk", "Noto Sans SC", system-ui, sans-serif;
    --body: "Noto Sans SC", system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; font-family: var(--body); color: var(--text-1); background: var(--bg-0); }
  body { min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 28px 16px 56px;
    background: radial-gradient(1100px 700px at 18% -8%, rgba(140,123,255,.22), transparent 60%),
                radial-gradient(900px 620px at 92% 8%, rgba(85,214,255,.16), transparent 58%),
                linear-gradient(180deg, var(--bg-1), var(--bg-2) 38%, var(--bg-0) 100%); }
  .device { position: relative; width: 100%; max-width: 430px; border-radius: 38px; padding: 10px;
    background: linear-gradient(160deg, rgba(58,74,140,.55), rgba(26,32,64,.35));
    border: 1px solid rgba(120,135,200,.30); box-shadow: 0 40px 90px -30px rgba(0,0,0,.75), inset 0 1px 0 rgba(255,255,255,.06); overflow: hidden; }
  @media (max-width: 480px) { body { padding: 0; } .device { max-width: 100%; border-radius: 0; border: none; box-shadow: none; padding: 0; } }
  .screen { position: relative; border-radius: 30px; overflow: hidden; min-height: 920px;
    background: radial-gradient(700px 480px at 50% -10%, rgba(140,123,255,.10), transparent 60%),
                linear-gradient(180deg, #0B0D20 0%, #15132E 32%, #0A0C1C 72%, #080914 100%); }
  @media (max-width: 480px) { .screen { border-radius: 0; min-height: 100vh; } }
  .scroll { padding: 0 18px 36px; }

  /* 顶栏 */
  .np-bar { display: flex; align-items: center; gap: 10px; padding: 14px 0 6px; }
  .icon-btn { width: 38px; height: 38px; flex: 0 0 auto; display: grid; place-items: center; border-radius: 12px;
    background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.16); color: #fff; cursor: pointer; transition: transform .18s ease, background .18s ease; }
  .icon-btn:active { transform: scale(.92); background: rgba(255,255,255,.18); }
  .icon-btn svg { width: 18px; height: 18px; }
  .np-title { font-size: 11px; letter-spacing: 2px; color: var(--text-3); margin: 0 auto; text-transform: uppercase; }

  /* Hero */
  .hero { position: relative; margin-top: 6px; border-radius: 24px; padding: 22px 20px; overflow: hidden;
    background: linear-gradient(135deg, rgba(140,123,255,.30), rgba(85,214,255,.16));
    border: 1px solid var(--stroke); box-shadow: inset 0 1px 0 rgba(255,255,255,.07); }
  .hero::before { content: ""; position: absolute; inset: 0; background: radial-gradient(420px 220px at 85% -20%, rgba(255,108,92,.30), transparent 60%); }
  .hero-top { display: flex; align-items: center; gap: 14px; position: relative; }
  .hero-ico { width: 56px; height: 56px; flex: 0 0 auto; border-radius: 16px; display: grid; place-items: center; color: #fff;
    background: linear-gradient(135deg, var(--chip-active), #8C5CF6); box-shadow: 0 12px 26px -10px rgba(255,108,92,.6); }
  .hero-ico svg { width: 28px; height: 28px; }
  .hero-name { font-family: var(--display); font-size: 22px; font-weight: 700; color: var(--text-1); }
  .hero-sub { font-size: 12.5px; color: var(--text-2); margin-top: 3px; }
  .hero-stats { position: relative; display: flex; gap: 0; margin-top: 18px; }
  .hero-stat { flex: 1; text-align: center; position: relative; }
  .hero-stat + .hero-stat::before { content: ""; position: absolute; left: 0; top: 12%; height: 76%; width: 1px; background: rgba(255,255,255,.14); }
  .hero-stat-v { font-family: var(--display); font-size: 20px; font-weight: 700; color: var(--text-1); }
  .hero-stat-k { font-size: 11px; color: var(--text-3); margin-top: 2px; }

  /* 通用卡片 */
  .card { background: linear-gradient(180deg, rgba(30,42,82,.72), rgba(24,34,68,.72)); border: 1px solid var(--stroke); border-radius: 22px; padding: 16px; margin-top: 18px;
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); box-shadow: inset 0 1px 0 rgba(255,255,255,.05); }
  .card-title { font-family: var(--display); font-size: 16px; font-weight: 600; color: var(--text-1); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .card-title .badge { font-size: 10px; font-weight: 600; color: var(--accent); background: rgba(85,214,255,.12); border: 1px solid rgba(85,214,255,.3); padding: 2px 8px; border-radius: 999px; }

  /* 来源分布 */
  .src-legend { display: flex; gap: 16px; margin-bottom: 12px; }
  .src-leg { display: flex; align-items: center; gap: 7px; font-size: 12.5px; color: var(--text-2); }
  .dot { width: 9px; height: 9px; border-radius: 50%; }
  .dot-local { background: var(--primary); }
  .dot-net { background: var(--accent); }
  .src-track { height: 12px; border-radius: 999px; background: rgba(42,56,112,.5); overflow: hidden; display: flex; }
  .src-fill-local { height: 100%; background: linear-gradient(90deg, var(--primary-deep), var(--primary)); width: 0; transition: width 1s cubic-bezier(.16,1,.3,1); }
  .src-fill-net { height: 100%; background: linear-gradient(90deg, var(--accent), #8fe9ff); width: 0; transition: width 1s cubic-bezier(.16,1,.3,1); }
  .src-nums { display: flex; justify-content: space-between; font-family: var(--display); font-size: 12.5px; font-weight: 600; color: var(--text-2); margin-top: 9px; }
  .src-extra { display: flex; gap: 10px; margin-top: 14px; }
  .src-chip { flex: 1; text-align: center; padding: 10px; border-radius: 14px; background: rgba(255,255,255,.05); border: 1px solid var(--stroke); }
  .src-chip-v { font-family: var(--display); font-size: 17px; font-weight: 700; color: var(--text-1); }
  .src-chip-k { font-size: 11px; color: var(--text-3); margin-top: 2px; }

  /* 流派分布 */
  .genre-row { display: flex; align-items: center; gap: 12px; margin-bottom: 13px; }
  .genre-row:last-child { margin-bottom: 0; }
  .genre-name { width: 76px; flex: 0 0 auto; font-size: 12.5px; color: var(--text-2); text-align: right; }
  .genre-track { flex: 1; height: 9px; border-radius: 999px; background: rgba(42,56,112,.5); overflow: hidden; }
  .genre-fill { height: 100%; border-radius: 999px; width: 0;
    background: linear-gradient(90deg, var(--primary), var(--accent)); transition: width 1s cubic-bezier(.16,1,.3,1); }
  .genre-val { width: 42px; flex: 0 0 auto; font-family: var(--display); font-size: 12px; font-weight: 600; color: var(--text-3); text-align: left; }

  /* 列表（最近添加 / 艺术家榜通用） */
  .list-row { display: flex; align-items: center; gap: 12px; padding: 9px 0; }
  .list-row + .list-row { border-top: 1px solid rgba(42,56,112,.5); }
  .list-cover { width: 46px; height: 46px; flex: 0 0 auto; border-radius: 12px; display: grid; place-items: center; font-family: var(--display); font-weight: 700; font-size: 17px; color: #fff; box-shadow: inset 0 0 0 1px rgba(255,255,255,.08); }
  .list-ava { width: 44px; height: 44px; flex: 0 0 auto; border-radius: 50%; display: grid; place-items: center; font-family: var(--display); font-weight: 700; font-size: 16px; color: #fff; }
  .list-meta { flex: 1; min-width: 0; }
  .list-title { font-size: 14px; font-weight: 500; color: var(--text-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .list-sub { font-size: 12px; color: var(--text-3); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .list-val { font-family: var(--display); font-size: 12px; font-weight: 600; color: var(--text-3); flex: 0 0 auto; }
  .list-val .accent { color: var(--accent); }

  /* 数据洞察 · 滑动环形图 */
  .pie-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .pie-head .card-title { margin-bottom: 0; }
  .pie-counter { font-family: var(--display); font-size: 12px; font-weight: 600; color: var(--text-3); }
  .pie-viewport { overflow: hidden; border-radius: 16px; touch-action: pan-y; }
  .pie-track { display: flex; transition: transform .42s cubic-bezier(.16,1,.3,1); will-change: transform; }
  .pie-slide { flex: 0 0 100%; min-width: 100%; padding: 2px; }
  .pie-body { display: flex; align-items: center; gap: 16px; }
  .donut { width: 138px; height: 138px; flex: 0 0 auto; }
  .donut-num { fill: var(--text-1); font-family: var(--display); font-size: 21px; font-weight: 700; }
  .donut-lab { fill: var(--text-3); font-family: var(--body); font-size: 10px; }
  .pie-legend { flex: 1; min-width: 0; }
  .pie-leg-row { display: flex; align-items: center; gap: 9px; padding: 5.5px 0; font-size: 12.5px; }
  .pie-leg-row + .pie-leg-row { border-top: 1px solid rgba(42,56,112,.4); }
  .pie-leg-dot { width: 10px; height: 10px; border-radius: 3px; flex: 0 0 auto; }
  .pie-leg-name { flex: 1; min-width: 0; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pie-leg-val { font-family: var(--display); font-weight: 600; color: var(--text-1); }
  .pie-leg-pct { color: var(--text-3); font-size: 11px; margin-left: 5px; font-weight: 400; }
  .pie-nav { display: flex; align-items: center; justify-content: center; gap: 16px; margin-top: 14px; }
  .pie-dots { display: flex; gap: 7px; }
  .pie-dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(141,147,183,.4); cursor: pointer; transition: all .25s ease; }
  .pie-dot.active { width: 18px; border-radius: 999px; background: linear-gradient(90deg, var(--primary), var(--accent)); }
  .pie-arrow { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--stroke); background: rgba(255,255,255,.06); color: var(--text-1); font-size: 18px; line-height: 1; cursor: pointer; display: grid; place-items: center; transition: background .18s ease; user-select: none; }
  .pie-arrow:active { background: rgba(255,255,255,.16); }
  .pie-arrow:disabled { opacity: .3; cursor: default; }

  .reveal { opacity: 0; transform: translateY(14px); animation: rise .6s cubic-bezier(.16,1,.3,1) forwards; }
  @keyframes rise { to { opacity: 1; transform: none; } }
  .hint { text-align: center; font-size: 11.5px; color: var(--text-3); margin-top: 22px; }
</style>
</head>
<body>
  <div class="device">
    <div class="screen">
      <div class="scroll">

        <!-- 顶栏 -->
        <div class="np-bar">
          <button class="icon-btn" title="返回" aria-label="返回">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <div class="np-title">音乐库</div>
          <button class="icon-btn" title="更多" aria-label="更多">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 12h.01M12 12h.01M18 12h.01"/></svg>
          </button>
        </div>

        <!-- Hero -->
        <div class="hero reveal" style="animation-delay:0s">
          <div class="hero-top">
            <div class="hero-ico">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13M9 18a3 3 0 1 1-6 0 3 3 0 0 1 6 0zM21 16a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/></svg>
            </div>
            <div>
              <div class="hero-name">我的音乐库</div>
              <div class="hero-sub">1,284 首歌曲 · 213 位艺术家 · 167 张专辑</div>
            </div>
          </div>
          <div class="hero-stats">
            <div class="hero-stat"><div class="hero-stat-v">1,284</div><div class="hero-stat-k">歌曲</div></div>
            <div class="hero-stat"><div class="hero-stat-v">213</div><div class="hero-stat-k">艺术家</div></div>
            <div class="hero-stat"><div class="hero-stat-v">167</div><div class="hero-stat-k">专辑</div></div>
            <div class="hero-stat"><div class="hero-stat-v">106.7</div><div class="hero-stat-k">小时</div></div>
          </div>
        </div>

        <!-- 来源分布 -->
        <div class="card reveal" style="animation-delay:.06s">
          <div class="card-title">来源分布</div>
          <div class="src-legend">
            <div class="src-leg"><span class="dot dot-local"></span>本地 1,024</div>
            <div class="src-leg"><span class="dot dot-net"></span>网络 260</div>
          </div>
          <div class="src-track">
            <div class="src-fill-local" id="srcLocal"></div>
            <div class="src-fill-net" id="srcNet"></div>
          </div>
          <div class="src-nums"><span id="srcLocalPct">本地 79.7%</span><span id="srcNetPct">网络 20.3%</span></div>
          <div class="src-extra">
            <div class="src-chip"><div class="src-chip-v">86</div><div class="src-chip-k">我喜欢的</div></div>
            <div class="src-chip"><div class="src-chip-v">5.5 GB</div><div class="src-chip-k">总大小</div></div>
            <div class="src-chip"><div class="src-chip-v">32</div><div class="src-chip-k">文件夹</div></div>
          </div>
        </div>

        <!-- 数据洞察 · 滑动环形图 -->
        <div class="card pie-card reveal" style="animation-delay:.08s">
          <div class="pie-head">
            <div class="card-title">数据洞察 <span class="badge" id="pieName">音频格式</span></div>
            <div class="pie-counter" id="pieCounter">1 / 3</div>
          </div>
          <div class="pie-viewport" id="pieViewport">
            <div class="pie-track" id="pieTrack"></div>
          </div>
          <div class="pie-nav">
            <button class="pie-arrow" id="piePrev" aria-label="上一项" disabled>‹</button>
            <div class="pie-dots" id="pieDots"></div>
            <button class="pie-arrow" id="pieNext" aria-label="下一项">›</button>
          </div>
        </div>

        <!-- 流派分布 -->
        <div class="card reveal" style="animation-delay:.1s">
          <div class="card-title">流派分布 <span class="badge">按歌曲数</span></div>
          <div id="genres"></div>
        </div>

        <!-- 最近添加 -->
        <div class="card reveal" style="animation-delay:.14s">
          <div class="card-title">最近添加</div>
          <div id="recent"></div>
        </div>

        <!-- 艺术家榜 -->
        <div class="card reveal" style="animation-delay:.18s">
          <div class="card-title">艺术家榜 <span class="badge">按歌曲数</span></div>
          <div id="artists"></div>
        </div>

        <p class="hint reveal" style="animation-delay:.22s">音乐库详情页原型 · 仅展示视觉，聚焦「库里有什么」</p>
      </div>
    </div>
  </div>

<script>
  // —— 模拟库数据（字段对齐 MusicDatabase 聚合结果）——
  const library = {
    songCount: 1284, artistCount: 213, albumCount: 167, totalHours: 106.7,
    localCount: 1024, networkCount: 260, favoriteCount: 86, totalSizeGB: 5.5, folderCount: 32
  };
  const genres = [
    ["华语流行", 412], ["欧美流行", 230], ["日语", 158], ["韩语", 132],
    ["轻音乐", 98], ["摇滚", 76], ["其他", 178]
  ];
  const recent = [
    ["夜曲", "周杰伦", "3 天前"], ["起风了", "买辣椒也用券", "5 天前"],
    ["Lose Yourself", "Eminem", "1 周前"], ["红玫瑰", "陈奕迅", "1 周前"],
    ["夜空中最亮的星", "逃跑计划", "2 周前"]
  ];
  const artists = [
    ["周杰伦", 142], ["陈奕迅", 96], ["薛之谦", 74], ["Taylor Swift", 61], ["李荣浩", 53]
  ];
  const rpal = [["#8C7BFF","#55D6FF"],["#FF7AAE","#FFB36B"],["#55D6FF","#7AF0C8"],["#A78BFA","#F0ABFC"],["#5EEAD4","#60A5FA"]];
  const apal = [["#FF7AAE","#FFB36B"],["#8C7BFF","#55D6FF"],["#7AF0C8","#5EEAD4"],["#F0ABFC","#A78BFA"],["#60A5FA","#55D6FF"]];
  function grad(i, pal){ const p = pal[i % pal.length]; return `linear-gradient(135deg, ${p[0]}, ${p[1]})`; }
  function initial(n){ return (n || "♪").trim().charAt(0); }

  // 来源分布条
  const total = library.localCount + library.networkCount;
  const lp = library.localCount / total * 100, np = library.networkCount / total * 100;
  requestAnimationFrame(() => requestAnimationFrame(() => {
    document.getElementById("srcLocal").style.width = lp + "%";
    document.getElementById("srcNet").style.width = np + "%";
  }));
  document.getElementById("srcLocalPct").textContent = `本地 ${(lp).toFixed(1)}%`;
  document.getElementById("srcNetPct").textContent = `网络 ${(np).toFixed(1)}%`;

  // 流派分布
  const gEl = document.getElementById("genres");
  const gMax = Math.max(...genres.map(g => g[1]));
  genres.forEach((g) => {
    const row = document.createElement("div");
    row.className = "genre-row";
    row.innerHTML = `<div class="genre-name">${g[0]}</div>
      <div class="genre-track"><div class="genre-fill"></div></div>
      <div class="genre-val">${g[1]}</div>`;
    gEl.appendChild(row);
    const fill = row.querySelector(".genre-fill");
    requestAnimationFrame(() => requestAnimationFrame(() => { fill.style.width = (g[1] / gMax * 100) + "%"; }));
  });

  // 最近添加
  const rEl = document.getElementById("recent");
  recent.forEach((r, i) => {
    const row = document.createElement("div");
    row.className = "list-row";
    row.innerHTML = `
      <div class="list-cover" style="background:${grad(i, rpal)}">${initial(r[0])}</div>
      <div class="list-meta"><div class="list-title">${r[0]}</div><div class="list-sub">${r[1]}</div></div>
      <div class="list-val">${r[2]}</div>`;
    rEl.appendChild(row);
  });

  // 艺术家榜
  const aEl = document.getElementById("artists");
  const aMax = Math.max(...artists.map(a => a[1]));
  artists.forEach((a, i) => {
    const row = document.createElement("div");
    row.className = "list-row";
    row.innerHTML = `
      <div class="list-ava" style="background:${grad(i, apal)}">${initial(a[0])}</div>
      <div class="list-meta"><div class="list-title">${a[0]}</div><div class="list-sub">${a[1]} 首歌曲</div></div>
      <div class="list-val"><span class="accent">${((a[1] / library.songCount) * 100).toFixed(1)}%</span></div>`;
    aEl.appendChild(row);
  });

  // —— 数据洞察：滑动环形图（音频格式 / 音质 / 艺术家歌曲）——
  const piePalette = ["#8C7BFF","#55D6FF","#FF7AAE","#7AF0C8","#FFB36B","#F0ABFC","#5EEAD4","#A78BFA"];
  const pieData = [
    { name: "音频格式", segments: [
      ["MP3", 812], ["FLAC", 286], ["M4A", 88], ["WAV", 64], ["APE", 34] ] },
    { name: "音频音质", segments: [
      ["无损 (FLAC/APE/WAV)", 384], ["320 kbps", 612], ["256 kbps", 196], ["128 kbps", 92] ] },
    { name: "艺术家歌曲", segments: [
      ["周杰伦", 142], ["陈奕迅", 96], ["薛之谦", 74], ["Taylor Swift", 61], ["李荣浩", 53], ["其他", 858] ] }
  ];

  function donutSVG(segs, total) {
    const r = 48, C = 2 * Math.PI * r, cx = 60, cy = 60, sw = 15;
    let cum = 0, arcs = "";
    segs.forEach((s, i) => {
      const frac = s[1] / total;
      const len = frac * C;
      const startDeg = cum * 360 - 90;
      arcs += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${piePalette[i % piePalette.length]}" stroke-width="${sw}" stroke-dasharray="${len} ${C * 4}" transform="rotate(${startDeg} ${cx} ${cy})" />`;
      cum += frac;
    });
    return `<svg viewBox="0 0 120 120" class="donut">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(42,56,112,.35)" stroke-width="${sw}" />
      ${arcs}
      <text x="60" y="57" text-anchor="middle" class="donut-num">${total}</text>
      <text x="60" y="73" text-anchor="middle" class="donut-lab">首 (库内)</text>
    </svg>`;
  }

  const pieTrack = document.getElementById("pieTrack");
  const pieDots = document.getElementById("pieDots");
  let pieIndex = 0;

  pieData.forEach((d, idx) => {
    const total = d.segments.reduce((s, x) => s + x[1], 0);
    const slide = document.createElement("div");
    slide.className = "pie-slide";
    slide.innerHTML = `<div class="pie-body">${donutSVG(d.segments, total)}
      <div class="pie-legend">${d.segments.map((s, i) => `
        <div class="pie-leg-row">
          <span class="pie-leg-dot" style="background:${piePalette[i % piePalette.length]}"></span>
          <span class="pie-leg-name">${s[0]}</span>
          <span class="pie-leg-val">${s[1]}<span class="pie-leg-pct">${(s[1] / total * 100).toFixed(1)}%</span></span>
        </div>`).join("")}</div></div>`;
    pieTrack.appendChild(slide);

    const dot = document.createElement("div");
    dot.className = "pie-dot" + (idx === 0 ? " active" : "");
    dot.addEventListener("click", () => goTo(idx));
    pieDots.appendChild(dot);
  });

  function goTo(i) {
    pieIndex = Math.max(0, Math.min(pieData.length - 1, i));
    pieTrack.style.transform = `translateX(-${pieIndex * 100}%)`;
    pieDots.querySelectorAll(".pie-dot").forEach((d, k) => d.classList.toggle("active", k === pieIndex));
    document.getElementById("pieCounter").textContent = `${pieIndex + 1} / ${pieData.length}`;
    document.getElementById("pieName").textContent = pieData[pieIndex].name;
    document.getElementById("piePrev").disabled = pieIndex === 0;
    document.getElementById("pieNext").disabled = pieIndex === pieData.length - 1;
  }
  document.getElementById("piePrev").addEventListener("click", () => goTo(pieIndex - 1));
  document.getElementById("pieNext").addEventListener("click", () => goTo(pieIndex + 1));

  // 拖动 / 触摸滑动
  const pieViewport = document.getElementById("pieViewport");
  let startX = 0, dx = 0, dragging = false;
  pieViewport.addEventListener("pointerdown", e => {
    startX = e.clientX; dx = 0; dragging = true;
    pieTrack.style.transition = "none";
    pieViewport.setPointerCapture(e.pointerId);
  });
  pieViewport.addEventListener("pointermove", e => {
    if (!dragging) return;
    dx = e.clientX - startX;
    pieTrack.style.transform = `translateX(calc(-${pieIndex * 100}% + ${dx}px))`;
  });
  function endDrag() {
    if (!dragging) return;
    dragging = false;
    pieTrack.style.transition = "";
    const w = pieViewport.clientWidth;
    if (Math.abs(dx) > w * 0.22) goTo(pieIndex + (dx < 0 ? 1 : -1));
    else goTo(pieIndex);
    dx = 0;
  }
  pieViewport.addEventListener("pointerup", endDrag);
  pieViewport.addEventListener("pointercancel", endDrag);
</script>
</body>
</html>
