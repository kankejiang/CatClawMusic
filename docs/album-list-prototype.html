<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>专辑列表 · 原型</title>
<style>
  :root{
    --bg:#080B1A; --bg2:#0C1024; --card:rgba(255,255,255,.045); --card-strong:rgba(255,255,255,.07);
    --stroke:rgba(255,255,255,.09); --stroke-strong:rgba(255,255,255,.16);
    --text-1:#EAF0FF; --text-2:#A8B4D8; --text-3:#67729B;
    --accent:#8C7BFF; --accent2:#55D6FF; --chip-active:#8C7BFF;
    --src-local:#55D6FF; --src-net:#FF9F6B;
    --display:"SF Pro Display","HarmonyOS Sans SC","PingFang SC",system-ui,sans-serif;
    --body:"SF Pro Text","HarmonyOS Sans SC","PingFang SC",system-ui,sans-serif;
    --grad:linear-gradient(135deg,#8C7BFF,#55D6FF);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:#05070F;font-family:var(--body);display:flex;justify-content:center;min-height:100vh}
  .phone{position:relative;width:402px;min-height:874px;background:
      radial-gradient(120% 80% at 50% -10%,rgba(140,123,255,.18),transparent 60%),
      linear-gradient(180deg,var(--bg),var(--bg2));
    color:var(--text-1);overflow:hidden;box-shadow:0 40px 90px -30px rgba(0,0,0,.8)}
  .phone::before{content:"";position:absolute;inset:0;background:
      radial-gradient(90% 50% at 100% 0,rgba(85,214,255,.10),transparent 55%),
      radial-gradient(80% 50% at 0 100%,rgba(140,123,255,.10),transparent 55%);pointer-events:none}
  .scroll{position:relative;height:874px;overflow-y:auto;padding:0 0 28px;scrollbar-width:none}
  .scroll::-webkit-scrollbar{display:none}

  /* 顶栏 */
  .top{position:sticky;top:0;z-index:6;display:flex;align-items:center;gap:14px;padding:16px 18px 12px;
    background:linear-gradient(180deg,rgba(8,11,26,.96),rgba(8,11,26,.62) 70%,transparent);backdrop-filter:blur(14px)}
  .icon-btn{width:38px;height:38px;border:1px solid var(--stroke);border-radius:12px;background:var(--card-strong);
    display:grid;place-items:center;color:var(--text-1);cursor:pointer;flex:0 0 auto}
  .icon-btn svg{width:18px;height:18px}
  .top-title{font-size:17px;font-weight:700;font-family:var(--display)}
  .top-sub{font-size:11px;color:var(--text-3);margin-top:1px}
  .top-spacer{flex:1}

  /* Hero */
  .hero{position:relative;margin:6px 16px 14px;padding:22px 20px;border-radius:22px;overflow:hidden;
    background:linear-gradient(135deg,rgba(140,123,255,.22),rgba(85,214,255,.10));
    border:1px solid var(--stroke-strong)}
  .hero::after{content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;border-radius:50%;
    background:var(--grad);filter:blur(48px);opacity:.35}
  .hero h1{font-size:24px;font-weight:800;font-family:var(--display);letter-spacing:-.3px}
  .hero p{font-size:12.5px;color:var(--text-2);margin-top:6px}
  .hero .hstat{display:flex;gap:18px;margin-top:14px}
  .hero .hstat div{font-family:var(--display)}
  .hero .hstat b{font-size:19px;font-weight:700;display:block}
  .hero .hstat span{font-size:10.5px;color:var(--text-3)}

  /* 搜索 */
  .search{margin:0 16px 12px;display:flex;align-items:center;gap:9px;padding:11px 14px;border-radius:14px;
    background:var(--card-strong);border:1px solid var(--stroke)}
  .search svg{width:16px;height:16px;color:var(--text-3);flex:0 0 auto}
  .search input{flex:1;background:none;border:0;outline:none;color:var(--text-1);font-size:13.5px;font-family:var(--body)}
  .search input::placeholder{color:var(--text-3)}

  /* 筛选 chips */
  .chips{display:flex;gap:8px;overflow-x:auto;padding:0 16px 4px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;padding:7px 14px;border-radius:999px;font-size:12.5px;font-weight:500;cursor:pointer;
    border:1px solid var(--stroke);background:var(--card);color:var(--text-2);transition:.18s}
  .chip.active{background:var(--grad);border-color:transparent;color:#fff;font-weight:600;
    box-shadow:0 8px 20px -8px rgba(140,123,255,.7)}

  /* 工具栏 */
  .toolbar{display:flex;align-items:center;gap:10px;padding:12px 16px 8px}
  .sorts{display:flex;gap:6px;overflow-x:auto;flex:1;scrollbar-width:none}
  .sorts::-webkit-scrollbar{display:none}
  .sort{flex:0 0 auto;font-size:11.5px;padding:5px 11px;border-radius:999px;cursor:pointer;color:var(--text-3);
    border:1px solid transparent;white-space:nowrap}
  .sort.active{color:var(--text-1);border-color:var(--stroke-strong);background:var(--card-strong)}
  .view-toggle{flex:0 0 auto;display:flex;background:var(--card-strong);border:1px solid var(--stroke);border-radius:10px;overflow:hidden}
  .view-toggle button{width:34px;height:30px;background:none;border:0;cursor:pointer;display:grid;place-items:center;color:var(--text-3)}
  .view-toggle button.active{background:var(--grad);color:#fff}
  .view-toggle svg{width:16px;height:16px}

  /* 主体布局：列表 + 右侧时代 rail */
  .body{display:flex;gap:8px;padding:4px 8px 0 16px;align-items:flex-start}
  .stage{flex:1;min-width:0;position:relative}
  .rail{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:2px;padding-top:4px;
    max-height:560px;overflow-y:auto;scrollbar-width:none;position:sticky;top:8px}
  .rail::-webkit-scrollbar{display:none}
  .rail button{width:30px;height:30px;border:0;background:none;color:var(--text-3);font-size:10.5px;font-weight:600;
    cursor:pointer;border-radius:8px;font-family:var(--display);transition:.15s}
  .rail button.active{background:var(--chip-active);color:#fff}
  .rail .sep{width:18px;height:1px;background:var(--stroke);margin:3px 0}

  .era-head{font-size:12px;font-weight:700;color:var(--text-2);padding:14px 4px 8px;font-family:var(--display);
    display:flex;align-items:baseline;gap:8px}
  .era-head small{font-size:10.5px;color:var(--text-3);font-weight:500}

  /* 网格视图 */
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:2px 4px}
  .grid.hide{display:none}
  .acard{cursor:pointer}
  .acov{position:relative;aspect-ratio:1;border-radius:14px;overflow:hidden;box-shadow:0 10px 24px -12px rgba(0,0,0,.6)}
  .acov .ini{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--display);font-weight:800;
    font-size:30px;color:rgba(255,255,255,.92);text-shadow:0 2px 10px rgba(0,0,0,.3)}
  .acov::after{content:"";position:absolute;left:8px;right:8px;bottom:8px;height:3px;border-radius:3px;
    background:rgba(255,255,255,.85)}
  .acard .nm{font-size:12px;font-weight:600;color:var(--text-1);margin-top:7px;line-height:1.3;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .acard .ar{font-size:10.5px;color:var(--text-3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .acard .yr{font-size:10px;color:var(--text-3);margin-top:1px;font-family:var(--display)}

  /* 列表视图 */
  .list{display:flex;flex-direction:column;gap:2px;padding:2px 4px}
  .list.hide{display:none}
  .lrow{display:flex;align-items:center;gap:12px;padding:9px 6px;cursor:pointer;border-radius:12px}
  .lrow:hover{background:var(--card)}
  .lcov{width:50px;height:50px;flex:0 0 auto;border-radius:11px;position:relative;overflow:hidden;
    display:grid;place-items:center;font-family:var(--display);font-weight:800;font-size:18px;color:#fff;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08)}
  .lmeta{flex:1;min-width:0}
  .ln{font-size:13.5px;font-weight:600;color:var(--text-1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ls{font-size:11.5px;color:var(--text-3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lplay{font-family:var(--display);font-size:11px;font-weight:700;flex:0 0 auto;display:flex;align-items:center;gap:4px;color:var(--accent2)}
  .src-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
  .src-local{background:var(--src-local)} .src-net{background:var(--src-net)}

  .empty{padding:60px 20px;text-align:center;color:var(--text-3);font-size:13px;display:none}

  .hint{text-align:center;font-size:11px;color:var(--text-3);margin-top:18px;padding:0 20px;line-height:1.6}
  .reveal{opacity:0;transform:translateY(14px);animation:rise .6s cubic-bezier(.16,1,.3,1) forwards}
  @keyframes rise{to{opacity:1;transform:none}}
  .toast{position:fixed;left:50%;bottom:34px;transform:translateX(-50%) translateY(20px);opacity:0;pointer-events:none;
    background:rgba(20,26,56,.95);border:1px solid var(--stroke-strong);color:var(--text-1);padding:11px 20px;border-radius:999px;
    font-size:13px;box-shadow:0 12px 30px -10px rgba(0,0,0,.6);transition:opacity .25s ease,transform .25s ease;z-index:20}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
  <div class="phone">
    <div class="scroll">
      <!-- 顶栏 -->
      <div class="top">
        <div class="icon-btn" title="返回">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </div>
        <div>
          <div class="top-title">专辑</div>
          <div class="top-sub">浏览音乐库中的所有专辑</div>
        </div>
        <div class="top-spacer"></div>
        <div class="icon-btn" title="搜索">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
        </div>
      </div>

      <!-- Hero -->
      <div class="hero reveal">
        <h1>我的专辑库</h1>
        <p>按年份、来源与播放热度浏览你的收藏</p>
        <div class="hstat">
          <div><b id="totalAlbums">167</b><span>张专辑</span></div>
          <div><b>2,418</b><span>首歌曲</span></div>
          <div><b>148</b><span>位艺术家</span></div>
        </div>
      </div>

      <!-- 搜索 -->
      <div class="search reveal" style="animation-delay:.05s">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
        <input id="q" placeholder="搜索专辑或艺术家" autocomplete="off">
      </div>

      <!-- 来源筛选 -->
      <div class="chips reveal" id="filters" style="animation-delay:.08s">
        <div class="chip active" data-f="all">全部</div>
        <div class="chip" data-f="本地">本地</div>
        <div class="chip" data-f="网络">网络</div>
      </div>

      <!-- 工具栏 -->
      <div class="toolbar reveal" style="animation-delay:.1s">
        <div class="sorts" id="sorts">
          <div class="sort active" data-s="def">默认</div>
          <div class="sort" data-s="year">年份新→旧</div>
          <div class="sort" data-s="name">名称 A-Z</div>
          <div class="sort" data-s="count">歌曲数</div>
          <div class="sort" data-s="play">最常听</div>
        </div>
        <div class="view-toggle" id="viewToggle">
          <button class="active" data-v="grid" title="网格">
            <svg viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
          </button>
          <button data-v="list" title="列表">
            <svg viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="4" width="18" height="3" rx="1.5"/><rect x="3" y="10.5" width="18" height="3" rx="1.5"/><rect x="3" y="17" width="18" height="3" rx="1.5"/></svg>
          </button>
        </div>
      </div>

      <!-- 主体：列表 + 年代 rail -->
      <div class="body">
        <div class="stage">
          <div class="grid" id="grid"></div>
          <div class="list hide" id="list"></div>
          <div class="empty" id="empty">没有匹配的专辑</div>
        </div>
        <div class="rail" id="rail"></div>
      </div>

      <p class="hint reveal">网格 / 列表切换 · 来源筛选 · 排序 · 右侧年代索引进路（原型仅供确认视觉）</p>
    </div>
    <div class="toast" id="toast"></div>
  </div>

<script>
  // —— 模拟专辑数据（字段对齐 Album 模型 + 派生维度）——
  // src: 本地 / 网络（由 Song.IsAlsoLocal / IsAlsoNetwork 派生）
  // play: 播放次数（由歌曲 PlayCount 聚合）
  // year: 来自音频标签，本地可读取
  const pal = [["#8C7BFF","#55D6FF"],["#FF7AAE","#FFB36B"],["#55D6FF","#7AF0C8"],["#A78BFA","#F0ABFC"],
               ["#5EEAD4","#60A5FA"],["#FBBF24","#FB7185"],["#818CF8","#22D3EE"],["#F472B6","#C084FC"]];
  function grad(i){const p=pal[i%pal.length];return `linear-gradient(135deg, ${p[0]}, ${p[1]})`;}
  function ini(n){return (n||"♪").trim().charAt(0);}

  const data = [
    {t:"叶惠美",a:"周杰伦",y:2003,n:11,p:842,s:"本地"}, {t:"范特西",a:"周杰伦",y:2001,n:10,p:765,s:"本地"},
    {t:"七里香",a:"周杰伦",y:2004,n:12,p:701,s:"本地"}, {t:"U87",a:"陈奕迅",y:2005,n:11,p:620,s:"本地"},
    {t:"认了吧",a:"陈奕迅",y:2007,n:11,p:540,s:"本地"}, {t:"The Life of Pablo",a:"Kanye West",y:2016,n:19,p:430,s:"网络"},
    {t:"1989",a:"Taylor Swift",y:2014,n:13,p:512,s:"网络"}, {t:"Lover",a:"Taylor Swift",y:2019,n:18,p:466,s:"网络"},
    {t:"醒着做梦",a:"李荣浩",y:2014,n:10,p:388,s:"本地"}, {t:"模特",a:"李荣浩",y:2013,n:10,p:355,s:"本地"},
    {t:"感官/世界",a:"孙燕姿",y:2003,n:12,p:298,s:"本地"}, {t:"25",a:"Adele",y:2015,n:11,p:340,s:"网络"},
    {t:"÷",a:"Ed Sheeran",y:2017,n:16,p:312,s:"网络"}, {t:"乐与怒",a:"Beyond",y:1993,n:10,p:276,s:"本地"},
    {t:"海阔天空",a:"Beyond",y:1993,n:14,p:254,s:"本地"}, {t:"Viva la Vida",a:"Coldplay",y:2008,n:10,p:233,s:"网络"},
    {t:"A Head Full of Dreams",a:"Coldplay",y:2015,n:11,p:221,s:"网络"}, {t:"后·青春期的诗",a:"五月天",y:2008,n:13,p:268,s:"本地"},
    {t:"DNA",a:"BTS",y:2017,n:15,p:198,s:"网络"}, {t:"THE ALBUM",a:"BLACKPINK",y:2020,n:8,p:176,s:"网络"},
    {t:"华",a:"张国荣",y:1989,n:11,p:164,s:"本地"}, {t:"梦中人",a:"王菲",y:1994,n:10,p:188,s:"本地"},
    {t:"故事",a:"G.E.M.邓紫棋",y:2014,n:10,p:242,s:"本地"}, {t:"小梦大半",a:"陈粒",y:2016,n:9,p:156,s:"网络"}
  ];
  data.forEach((d,i)=>{d.i=i; d.cov=grad(i);});

  // 派生年代分组
  function eraOf(y){ if(!y||y<1960) return "未知"; const d=Math.floor(y/10)*10; return d+"s"; }
  const ERAS = ["2020s","2010s","2000s","1990s","1980s","未知"];
  data.forEach(d=>d.era=eraOf(d.y));

  const grid=document.getElementById("grid"), list=document.getElementById("list"),
        rail=document.getElementById("rail"), empty=document.getElementById("empty"),
        toast=document.getElementById("toast");
  const state={f:"all", s:"def", v:"grid", q:"", era:"all"};
  let toastTimer=null;
  function showToast(msg){toast.textContent=msg;toast.classList.add("show");clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>toast.classList.remove("show"),1500);}

  function norm(s){return (s||"").toLowerCase();}
  function filtered(){
    let arr=data.filter(d=>{
      if(state.f!=="all" && d.s!==state.f) return false;
      if(state.era!=="all" && d.era!==state.era) return false;
      if(state.q){const q=norm(state.q); if(!norm(d.t).includes(q)&&!norm(d.a).includes(q)) return false;}
      return true;
    });
    const s=state.s;
    if(s==="year") arr.sort((a,b)=>(b.y||0)-(a.y||0));
    else if(s==="name") arr.sort((a,b)=>norm(a.t).localeCompare(norm(b.t),"zh"));
    else if(s==="count") arr.sort((a,b)=>b.n-a.n);
    else if(s==="play") arr.sort((a,b)=>b.p-a.p);
    else arr.sort((a,b)=>(b.y||0)-(a.y||0)|| norm(a.t).localeCompare(norm(b.t),"zh"));
    return arr;
  }

  function srcTag(s){return s==="网络"
    ? `<span class="src-dot src-net"></span> 网络`
    : `<span class="src-dot src-local"></span> 本地`;}

  function cardHTML(d){
    return `<div class="acard" data-i="${d.i}">
      <div class="acov" style="background:${d.cov}"><span class="ini">${ini(d.t)}</span></div>
      <div class="nm">${d.t}</div>
      <div class="ar">${d.a}</div>
      <div class="yr">${d.y||"未知"} · ${d.n} 首</div>
    </div>`;
  }
  function rowHTML(d){
    return `<div class="lrow" data-i="${d.i}">
      <div class="lcov" style="background:${d.cov}">${ini(d.t)}</div>
      <div class="lmeta">
        <div class="ln">${d.t}</div>
        <div class="ls">${d.a} · ${d.y||"未知"} · ${d.n} 首</div>
      </div>
      <div class="lplay">${srcTag(d.s)}<span style="color:var(--text-3);font-weight:600">· ${d.p} 次</span></div>
    </div>`;
  }

  // 年代 rail
  function buildRail(){
    const counts={}; ERAS.forEach(e=>counts[e]=data.filter(d=>d.era===e).length);
    rail.innerHTML = `<button class="${state.era==='all'?'active':''}" data-era="all">全部</button><div class="sep"></div>`
      + ERAS.map(e=>`<button class="${state.era===e?'active':''}" data-era="${e}" title="${e}">${e.replace('s','')}</button>`).join("");
  }

  function render(){
    const arr=filtered();
    document.getElementById("totalAlbums").textContent=data.length;
    // 网格按年代分组；列表扁平
    if(state.v==="grid"){
      let html="";
      ERAS.forEach(e=>{
        const grp=arr.filter(d=>d.era===e);
        if(grp.length===0) return;
        html+=`<div class="era-head">${e} <small>${grp.length} 张</small></div>`;
        html+=`<div class="grid" style="padding:2px 4px">`+grp.map(cardHTML).join("")+`</div>`;
      });
      grid.innerHTML=html;
      grid.classList.remove("hide"); list.classList.add("hide");
    } else {
      list.innerHTML=arr.map(rowHTML).join("");
      list.classList.remove("hide"); grid.classList.add("hide");
    }
    const none=arr.length===0;
    empty.style.display=none?"block":"none";
  }

  // —— 事件 ——
  document.getElementById("q").addEventListener("input",e=>{state.q=e.target.value.trim();render();});
  document.getElementById("filters").addEventListener("click",e=>{
    const c=e.target.closest(".chip"); if(!c) return;
    document.querySelectorAll("#filters .chip").forEach(x=>x.classList.remove("active"));
    c.classList.add("active"); state.f=c.dataset.f; render();
  });
  document.getElementById("sorts").addEventListener("click",e=>{
    const s=e.target.closest(".sort"); if(!s) return;
    document.querySelectorAll("#sorts .sort").forEach(x=>x.classList.remove("active"));
    s.classList.add("active"); state.s=s.dataset.s; render();
  });
  document.getElementById("viewToggle").addEventListener("click",e=>{
    const b=e.target.closest("button"); if(!b) return;
    document.querySelectorAll("#viewToggle button").forEach(x=>x.classList.remove("active"));
    b.classList.add("active"); state.v=b.dataset.v; render();
  });
  rail.addEventListener("click",e=>{
    const b=e.target.closest("button"); if(!b) return;
    state.era=b.dataset.era; buildRail(); render();
  });
  // 点击专辑 → 详情反馈（原型）
  document.querySelector(".stage").addEventListener("click",e=>{
    const el=e.target.closest("[data-i]"); if(!el) return;
    const d=data[+el.dataset.i]; showToast(`打开专辑《${d.t}》· ${d.a}`);
  });

  buildRail(); render();
</script>
</body>
</html>
