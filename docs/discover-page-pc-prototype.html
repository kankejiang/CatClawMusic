<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CatClawMusic · 发现页（PC 桌面端原型）</title>
<style>
  /* ════════ Design Tokens（取自 Colors.xaml，与手机端一致）══════ */
  :root{
    --bg0:#0B0D20; --bg1:#15132E; --bg2:#0A0C1C; --bg3:#080914;
    --card:rgba(255,255,255,.055);
    --card-strong:rgba(255,255,255,.09);
    --stroke:rgba(255,255,255,.13);
    --stroke-soft:rgba(255,255,255,.08);
    --text:#f2f3fb; --text-2:rgba(242,243,251,.66); --text-3:rgba(242,243,251,.40);
    --primary:#7C5CFF; --primary-2:#9D86FF;
    --accent:#FF7AAE; --accent-2:#5CE1E6;
    --gold:#ffcf3f;
    --glow-p:rgba(124,92,255,.30); --glow-a:rgba(255,122,174,.22);
    --r-xs:12px; --r-sm:16px; --r-md:20px; --r-lg:24px; --r-xl:26px; --r-pill:999px;
    --sidebar-w:220px; --topbar-h:52px; --player-h:96px;
  }
  [data-theme="light"]{
    --bg0:#eef0fb; --bg1:#e6e9fb; --bg2:#f3f4fd; --bg3:#e8ebf8;
    --card:rgba(255,255,255,.70);
    --card-strong:rgba(255,255,255,.85);
    --stroke:rgba(20,18,50,.12);
    --stroke-soft:rgba(20,18,50,.07);
    --text:#1c1b2e; --text-2:rgba(28,27,46,.66); --text-3:rgba(28,27,46,.42);
    --glow-p:rgba(124,92,255,.16); --glow-a:rgba(255,122,174,.14);
    --gold:#f5a623;
  }
  *{box-sizing:border-box; -webkit-font-smoothing:antialiased;}
  html,body{height:100%; margin:0;}
  body{
    font-family:-apple-system,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
    background:#050611; color:var(--text);
    display:flex; align-items:center; justify-content:center;
    padding:24px; overflow:hidden;
  }
  /* ════════ Window Frame ═══════ */
  .window{
    width:min(1200px,100%); height:min(780px,100%);
    border-radius:14px; overflow:hidden;
    background:linear-gradient(160deg,var(--bg0),var(--bg1) 42%,var(--bg2) 70%,var(--bg3));
    position:relative;
    box-shadow:0 40px 90px -30px rgba(0,0,0,.75), 0 0 0 1px var(--stroke-soft);
    display:grid; grid-template-columns:var(--sidebar-w) 1fr;
    grid-template-rows:auto var(--topbar-h) 1fr var(--player-h);
  }
  .window::before{ /* radial glows */
    content:""; position:absolute; inset:0; pointer-events:none;
    background:
      radial-gradient(620px 320px at 82% -6%, var(--glow-p), transparent 70%),
      radial-gradient(520px 300px at 96% 100%, var(--glow-a), transparent 72%);
  }
  /* ── Title Bar ── */
  .titlebar{
    grid-column:1 / -1; height:34px; display:flex; align-items:center;
    padding:0 12px; gap:8px; position:relative; z-index:2;
    border-bottom:1px solid var(--stroke-soft);
    background:rgba(255,255,255,.02);
  }
  .win-dot{width:11px; height:11px; border-radius:50%; opacity:.85;}
  .wd-r{background:#ff5f57;} .wd-y{background:#febc2e;} .wd-g{background:#28c840;}
  .titlebar .appname{font-size:12px; color:var(--text-3); margin-left:8px; letter-spacing:.3px;}
  .win-ctrls{margin-left:auto; display:flex; gap:4px;}
  .win-ctrls span{width:30px; height:24px; display:grid; place-items:center; border-radius:6px;
    color:var(--text-2); font-size:13px; cursor:default;}
  .win-ctrls span:hover{background:rgba(255,255,255,.07);}
  /* ── Sidebar ── */
  .sidebar{
    grid-row:2 / -1; grid-column:1; position:relative; z-index:2;
    background:var(--card); backdrop-filter:blur(22px); -webkit-backdrop-filter:blur(22px);
    border-right:1px solid var(--stroke);
    display:flex; flex-direction:column; padding:14px 0 12px;
  }
  .logo{display:flex; align-items:center; gap:10px; padding:4px 18px 16px;}
  .logo .mark{width:36px; height:36px; border-radius:10px; display:grid; place-items:center;
    font-size:18px; background:linear-gradient(135deg,var(--primary),var(--accent));}
  .logo .name{font-size:15px; font-weight:700;}
  .logo .sub{font-size:10px; color:var(--text-3); letter-spacing:.5px;}
  .nav-h{font-size:10px; letter-spacing:2px; color:var(--text-3); padding:14px 20px 6px;}
  .nav-item{margin:2px 10px; padding:10px 12px; border-radius:10px; display:flex; align-items:center;
    gap:11px; font-size:14px; color:var(--text); cursor:pointer; transition:.15s; user-select:none;}
  .nav-item .ico{font-size:16px; width:20px; text-align:center;}
  .nav-item:hover{background:rgba(255,255,255,.05);}
  .nav-item.active{background:linear-gradient(135deg,rgba(124,92,255,.30),rgba(255,122,174,.18));
    box-shadow:inset 0 0 0 1px var(--stroke);}
  .nav-item.active .ico{filter:drop-shadow(0 0 6px var(--glow-p));}
  .playlists{flex:1; overflow:auto; margin-top:6px; padding:0 10px;}
  .pl-h{display:flex; align-items:center; justify-content:space-between; padding:12px 12px 6px;}
  .pl-h .t{font-size:10px; letter-spacing:2px; color:var(--text-3);}
  .pl-h .add{font-size:18px; color:var(--text-2); cursor:pointer;}
  .pl{display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:8px; font-size:13px;
    color:var(--text-2); cursor:pointer;}
  .pl:hover{background:rgba(255,255,255,.05); color:var(--text);}
  .pl .dot{width:7px; height:7px; border-radius:50%; background:var(--text-3);}
  .nav-bottom{margin-top:auto; padding:0 10px;}
  /* ── Top Bar ── */
  .topbar{
    grid-row:2; grid-column:2; position:relative; z-index:2;
    display:flex; align-items:center; gap:14px; padding:0 18px;
    background:var(--card); border-bottom:1px solid var(--stroke-soft);
    backdrop-filter:blur(22px); -webkit-backdrop-filter:blur(22px);
  }
  .search-box{flex:1; max-width:520px; height:38px; border-radius:var(--r-pill);
    display:flex; align-items:center; gap:10px; padding:0 14px; cursor:text;
    background:rgba(255,255,255,.05); border:1px solid var(--stroke); transition:.18s;}
  .search-box:focus-within{border-color:var(--primary); background:rgba(124,92,255,.10);
    box-shadow:0 0 0 3px var(--glow-p);}
  .search-ico{width:17px; height:17px; color:var(--text-3); flex:none;}
  .search{flex:1; height:100%; min-width:0; border:none; background:transparent; outline:none;
    color:var(--text); font-size:13.5px;}
  .search::placeholder{color:var(--text-3);}
  .search-kbd{font-size:11px; font-family:inherit; color:var(--text-3); letter-spacing:.5px;
    background:rgba(255,255,255,.07); border:1px solid var(--stroke); padding:2px 7px;
    border-radius:7px; flex:none; user-select:none;}
  .top-actions{display:flex; align-items:center; gap:10px; margin-left:auto;}
  /* ── Content ── */
  .content{grid-row:3; grid-column:2; position:relative; z-index:2; overflow-y:auto; padding:0 26px 26px;}
  .content::-webkit-scrollbar{width:9px;} .content::-webkit-scrollbar-thumb{background:var(--stroke); border-radius:9px;}
  .page-head{display:flex; align-items:center; gap:14px; padding:22px 2px 14px;}
  .page-head h1{margin:0; font-size:30px; font-weight:800; letter-spacing:.5px;}
  .page-head .spacer{flex:1;}
  .ph-title{display:flex; flex-direction:column; gap:3px;}
  .page-sub{font-size:13px; color:var(--text-2); font-weight:500;}
  /* AI toggle */
  .ai-toggle{display:flex; align-items:center; gap:9px; font-size:13px; color:var(--text-2);
    background:var(--card); border:1px solid var(--stroke); padding:7px 12px; border-radius:var(--r-pill);}
  .ai-toggle b{font-size:10px; background:linear-gradient(135deg,var(--primary),var(--accent)); color:#fff;
    padding:1px 6px; border-radius:var(--r-pill); letter-spacing:.5px;}
  .switch{width:40px; height:22px; border-radius:var(--r-pill); background:rgba(255,255,255,.14);
    position:relative; cursor:pointer; transition:.2s; flex:none;}
  .switch .knob{position:absolute; top:2px; left:2px; width:18px; height:18px; border-radius:50%;
    background:#fff; transition:.2s; box-shadow:0 1px 3px rgba(0,0,0,.4);}
  .switch.on{background:linear-gradient(135deg,var(--primary),var(--accent));}
  .switch.on .knob{left:20px;}
  .theme-btn{width:36px; height:36px; border-radius:50%; display:grid; place-items:center; cursor:pointer;
    background:var(--card); border:1px solid var(--stroke); font-size:15px;}
  /* Category tabs */
  .tabs{display:flex; gap:6px; padding:4px 2px 18px; position:sticky; top:0;
    background:linear-gradient(180deg, var(--bg2) 70%, transparent); z-index:3;}
  .tab{padding:8px 16px; border-radius:var(--r-pill); font-size:13.5px; font-weight:600; color:var(--text-2);
    cursor:pointer; transition:.15s; border:1px solid transparent;}
  .tab:hover{color:var(--text); background:rgba(255,255,255,.05);}
  .tab.active{color:#fff; background:linear-gradient(135deg,var(--primary),var(--accent));
    box-shadow:0 6px 18px -6px var(--glow-p);}
  .panel{display:none;} .panel.show{display:block; animation:fade .35s ease;}
  @keyframes fade{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}

  /* ── Hero（PC：横向多卡轮播，类似网易云精选活动）── */
  .hero-wrap{position:relative; margin:0 0 12px;}
  .hero{height:164px; overflow:hidden; border-radius:var(--r-lg);
    background:rgba(255,255,255,.04); box-shadow:inset 0 0 0 1px var(--stroke);}
  .hero-track{display:flex; height:100%; gap:18px; padding:0 14px;
    transition:transform .5s cubic-bezier(.4,0,.2,1); scroll-snap-type:x mandatory;
    overflow-x:auto; scrollbar-width:none;}
  .hero-track::-webkit-scrollbar{display:none;}
  .slide{flex:0 0 calc(50% - 13px); min-width:280px; height:100%; border-radius:var(--r-md);
    overflow:hidden; cursor:pointer; position:relative; scroll-snap-align:start;
    box-shadow:inset 0 0 0 1px var(--stroke), 0 12px 28px -16px rgba(0,0,0,.45);
    transition:box-shadow .2s, transform .25s;}
  .slide:hover{box-shadow:inset 0 0 0 1px var(--stroke), 0 16px 36px -16px rgba(0,0,0,.56);
    transform:translateY(-2px);}
  .slide .glow{position:absolute; right:-44px; top:-52px; width:220px; height:220px; border-radius:50%;
    filter:blur(18px); opacity:.46;}
  .slide .s-inner{position:relative; height:100%; padding:18px 24px; display:flex; flex-direction:column;}
  .slide .tag{font-size:10px; font-weight:700; letter-spacing:.8px; opacity:.90; margin-bottom:7px;
    display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border-radius:var(--r-pill);
    background:rgba(0,0,0,.22); width:fit-content; position:relative;}
  .slide .tag::before{content:''; width:6px; height:6px; border-radius:50%; background:currentColor;
    flex-shrink:0; opacity:.9;}
  .slide .h-title{font-size:21px; font-weight:800; margin-bottom:6px; position:relative; letter-spacing:.3px;}
  .slide .h-desc{font-size:12.5px; opacity:.80; position:relative; max-width:64%; line-height:1.45; flex:1;}
  .play-fab{position:absolute; right:22px; bottom:14px; width:42px; height:42px; border-radius:50%;
    background:rgba(255,255,255,.94); display:grid; place-items:center; cursor:pointer; z-index:5;
    box-shadow:0 8px 22px -6px rgba(0,0,0,.58); transition:.15s;}
  .play-fab:hover{transform:scale(1.07);} .play-fab svg{width:19px; height:19px; fill:var(--primary);}
  .slide.b0{background:linear-gradient(135deg,#7C5CFF 0%,#A78BFA 40%,#FF7AAE 100%); color:#fff;}
  .slide.b1{background:linear-gradient(135deg,#5CE1E6 0%,#7C5CFF 60%,#9D86FF 100%); color:#08222b;}
  .slide.b1 .h-desc{opacity:.78;} .slide.b1 .tag{background:rgba(255,255,255,.26);}
  .slide.b2{background:linear-gradient(135deg,#FFB35C 0%,#FF9B5C 40%,#FF7AAE 100%); color:#3a1c00;}
  .slide.b2 .tag{background:rgba(0,0,0,.14);} .slide.b2 .h-desc{opacity:.80;}
  .slide.b3{background:linear-gradient(135deg,#9D86FF 0%,#5CE1E6 60%,#62D2A2 100%); color:#fff;}
  /* arrows */
  .hero-arrow{position:absolute; top:50%; transform:translateY(-50%);
    width:32px; height:32px; border-radius:50%; display:grid; place-items:center;
    background:rgba(255,255,255,.10); backdrop-filter:blur(8px); color:var(--text);
    font-size:15px; cursor:pointer; z-index:10; border:1px solid var(--stroke-soft);
    transition:background .15s;}
  .hero-arrow:hover{background:rgba(255,255,255,.18);}
  .hero-prev{left:4px;} .hero-next{right:4px;}
  .dots{display:flex; gap:6px; justify-content:center; margin-top:10px;}
  .dot{width:7px; height:7px; border-radius:50%; background:var(--stroke); cursor:pointer; transition:.2s;}
  .dot.active{width:20px; border-radius:var(--r-pill); background:linear-gradient(90deg,var(--primary),var(--accent));}

  /* ── Section ── */
  .sec-head{display:flex; align-items:center; justify-content:space-between; margin:10px 2px 14px;}
  .sec-title{font-size:18px; font-weight:700;}
  .sec-link{font-size:12.5px; color:var(--text-2); cursor:pointer;} .sec-link:hover{color:var(--text);}
  .sub-note{font-size:12px; color:var(--text-3); padding:2px 2px 12px;}

  /* horizontal scroll rows */
  .hscroll{display:flex; gap:16px; overflow-x:auto; padding:2px 2px 14px; scroll-snap-type:x mandatory;}
  .hscroll::-webkit-scrollbar{height:7px;} .hscroll::-webkit-scrollbar-thumb{background:var(--stroke); border-radius:7px;}

  .daily-card{flex:0 0 150px; scroll-snap-align:start; cursor:pointer;}
  .daily-card .c-cover{width:150px; height:150px; border-radius:var(--r-md); position:relative; overflow:hidden;
    box-shadow:inset 0 0 0 1px var(--stroke); display:grid; place-items:center; font-size:40px;}
  .daily-card .c-cover .glyph{filter:drop-shadow(0 2px 6px rgba(0,0,0,.4));}
  .daily-card .c-play{position:absolute; right:10px; bottom:10px; width:40px; height:40px; border-radius:50%;
    background:rgba(124,92,255,.92); display:grid; place-items:center; opacity:0; transform:translateY(6px); transition:.18s;}
  .daily-card:hover .c-play{opacity:1; transform:none;} .daily-card .c-play svg{width:18px;height:18px;fill:#fff;}
  .daily-card .t{font-size:13.5px; font-weight:600; margin-top:9px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .daily-card .a{font-size:11.5px; color:var(--text-2); margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}

  .artist-card{flex:0 0 110px; scroll-snap-align:start; text-align:center; cursor:pointer;}
  .artist-card .av{width:96px; height:96px; border-radius:50%; margin:0 auto; display:grid; place-items:center;
    font-size:34px; box-shadow:inset 0 0 0 1px var(--stroke);}
  .artist-card .n{font-size:13px; font-weight:600; margin-top:9px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .artist-card .c{font-size:11px; color:var(--text-2); margin-top:1px;}

  /* grids */
  .grid-album{display:grid; grid-template-columns:repeat(6,1fr); gap:18px 16px;}
  .grid-artist{display:grid; grid-template-columns:repeat(8,1fr); gap:18px 12px; text-align:center;}
  .album-card{cursor:pointer;}
  .album-card .album-cover{width:100%; aspect-ratio:1/1; border-radius:var(--r-md); display:grid; place-items:center;
    font-size:34px; box-shadow:inset 0 0 0 1px var(--stroke); position:relative; overflow:hidden;}
  .album-card .album-cover .glyph{filter:drop-shadow(0 2px 6px rgba(0,0,0,.4));}
  .album-card .t{font-size:13px; font-weight:600; margin-top:8px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .album-card .a{font-size:11.5px; color:var(--text-2); margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .grid-artist .av{width:100%; aspect-ratio:1/1; border-radius:50%; display:grid; place-items:center; font-size:30px;
    box-shadow:inset 0 0 0 1px var(--stroke);}
  .grid-artist .n{font-size:12.5px; font-weight:600; margin-top:8px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .grid-artist .c{font-size:11px; color:var(--text-2); margin-top:1px;}

  /* two-column charts */
  .charts{display:grid; grid-template-columns:1fr 1fr; gap:22px;}
  .chart-col{background:var(--card); border:1px solid var(--stroke); border-radius:var(--r-lg); padding:8px 6px;}
  .list .row{display:flex; align-items:center; gap:14px; padding:11px 12px; border-radius:var(--r-sm); cursor:pointer;}
  .list .row:hover{background:rgba(255,255,255,.05);}
  .list .rank{width:26px; text-align:center; font-size:17px; font-weight:800; color:var(--text-3); font-style:italic; flex:none;}
  .list .rank.r1{color:#FFD24A;} .list .rank.r2{color:#D6E1FF;} .list .rank.r3{color:#FFB07A;}
  .list .rank.fav{color:var(--gold); font-style:normal; font-size:18px; text-shadow:0 1px 3px rgba(0,0,0,.35);}
  [data-theme="light"] .list .rank.fav{color:#f5a623; text-shadow:none;}
  .list .mini-cover{width:46px; height:46px; border-radius:10px; display:grid; place-items:center; font-size:18px;
    flex:none; box-shadow:inset 0 0 0 1px var(--stroke);}
  .list .meta{flex:1; min-width:0;}
  .list .t{font-size:14px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .list .s{font-size:12px; color:var(--text-2); margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .list .right{display:flex; align-items:center; gap:12px; color:var(--text-3); font-size:12px; flex:none;}
  .list .play{width:34px; height:34px; border-radius:50%; background:rgba(255,255,255,.10); display:grid; place-items:center;}
  .list .play svg{width:15px; height:15px; fill:var(--text);}

  .ctx-chips{display:flex; gap:8px; flex-wrap:wrap; margin:-4px 2px 16px;}
  .ctx-chip{font-size:12px; color:var(--text-2); background:var(--card); border:1px solid var(--stroke);
    padding:5px 12px; border-radius:var(--r-pill);}
  .ctx-chip b{color:var(--accent); font-weight:700;}

  /* ── Player Bar ── */
  .player{grid-row:4; grid-column:2; position:relative; z-index:2; display:grid;
    grid-template-columns:240px 1fr 160px; align-items:center; gap:24px; padding:0 24px;
    background:linear-gradient(135deg,var(--primary),var(--accent)); color:#fff;}
  .player::before{content:""; position:absolute; top:0; left:0; right:0; height:1px; background:rgba(255,255,255,.25);}
  .pl-song{display:flex; align-items:center; gap:12px; min-width:0;}
  .pl-song .cv{width:48px; height:48px; border-radius:10px; display:grid; place-items:center; font-size:20px;
    background:rgba(255,255,255,.18); flex:none;}
  .pl-song .tt{font-size:14px; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .pl-song .ar{font-size:12px; opacity:.85; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .pl-mid{display:flex; flex-direction:column; align-items:center; gap:7px;}
  .pl-ctrl{display:flex; align-items:center; gap:16px;}
  .pl-ctrl .b{width:34px; height:34px; border-radius:50%; display:grid; place-items:center; cursor:pointer; opacity:.92;}
  .pl-ctrl .b:hover{opacity:1; transform:scale(1.05);}
  .pl-ctrl .b svg{width:20px; height:20px; fill:#fff;}
  .pl-ctrl .b.main{width:42px; height:42px; background:rgba(255,255,255,.95);}
  .pl-ctrl .b.main svg{fill:var(--primary); width:22px; height:22px;}
  .pl-prog{display:flex; align-items:center; gap:10px; width:100%; max-width:560px;}
  .pl-prog .tm{font-size:11px; opacity:.9; width:34px; text-align:center; font-variant-numeric:tabular-nums;}
  .pl-track{flex:1; height:4px; border-radius:4px; background:rgba(255,255,255,.30); position:relative; cursor:pointer;}
  .pl-fill{position:absolute; left:0; top:0; bottom:0; width:36%; border-radius:4px; background:#fff;}
  .pl-vol{display:flex; align-items:center; gap:10px; justify-content:flex-end;}
  .pl-vol svg{width:18px; height:18px; fill:#fff; opacity:.85;}
  .pl-vol .vt{flex:1; height:4px; border-radius:4px; background:rgba(255,255,255,.30); position:relative;}
  .pl-vol .vf{position:absolute; left:0; top:0; bottom:0; width:60%; border-radius:4px; background:#fff;}
</style>
</head>
<body>
<div class="window">

  <!-- ═══ Title Bar ═══ -->
  <div class="titlebar">
    <span class="win-dot wd-r"></span><span class="win-dot wd-y"></span><span class="win-dot wd-g"></span>
    <span class="appname">CatClaw Music</span>
    <div class="win-ctrls">
      <span>—</span><span>▢</span><span>✕</span>
    </div>
  </div>

  <!-- ═══ Sidebar ═══ -->
  <aside class="sidebar">
    <div class="logo">
      <div class="mark">🐾</div>
      <div><div class="name">猫爪音乐</div><div class="sub">CatClaw Music</div></div>
    </div>
    <div class="nav-h">导航</div>
    <div class="nav-item active"><span class="ico">🔍</span><span>发现</span></div>
    <div class="nav-item"><span class="ico">🎵</span><span>我的音乐</span></div>
    <div class="nav-item"><span class="ico">📋</span><span>歌单</span></div>

    <div class="playlists">
      <div class="pl-h"><span class="t">我的歌单</span><span class="add">＋</span></div>
      <div class="pl"><span class="dot"></span>深夜电台</div>
      <div class="pl"><span class="dot"></span>通勤 BGM</div>
      <div class="pl"><span class="dot"></span>华语经典</div>
      <div class="pl"><span class="dot"></span>民谣拾遗</div>
      <div class="pl"><span class="dot"></span>周末赖床</div>
    </div>

    <div class="nav-bottom">
      <div class="nav-item"><span class="ico">⚙️</span><span>设置</span></div>
    </div>
  </aside>

  <!-- ═══ Top Bar ═══ -->
  <div class="topbar">
    <div class="search-box">
      <svg class="search-ico" viewBox="0 0 24 24"><path d="M21 21l-4.35-4.35M11 19a8 8 0 110-16 8 8 0 010 16z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <input class="search" placeholder="搜索歌曲、歌手、专辑…">
      <kbd class="search-kbd">⌘ K</kbd>
    </div>
    <div class="top-actions">
      <div class="theme-btn" id="themeBtn" title="切换深/浅色">🌙</div>
    </div>
  </div>

  <!-- ═══ Content ═══ -->
  <main class="content">
    <div class="page-head">
      <div class="ph-title">
        <h1>发现</h1>
        <div class="page-sub" id="greet">晚上好，为你精选今日好歌</div>
      </div>
      <div class="spacer"></div>
      <div class="ai-toggle"><span class="lbl">智能推荐 <b>AI</b></span>
        <div class="switch" id="aiSwitch"><div class="knob"></div></div></div>
    </div>

    <div class="tabs" id="tabs">
      <div class="tab active" data-cat="rec">推荐</div>
      <div class="tab" data-cat="rank">排行榜</div>
      <div class="tab" data-cat="artist">歌手</div>
      <div class="tab" data-cat="album">推荐专辑</div>
    </div>

    <!-- 推荐 -->
    <div class="panel show" data-panel="rec">
      <div class="hero-wrap">
        <div class="hero" id="heroBox">
          <div class="hero-arrow hero-prev" id="heroPrev" title="上一张">‹</div>
          <div class="hero-track" id="heroTrack"></div>
          <div class="hero-arrow hero-next" id="heroNext" title="下一张">›</div>
        </div>
        <div class="dots" id="heroDots"></div>
      </div>
      <div class="dots" id="heroDots"></div>

      <div class="sec-head"><div class="sec-title" id="dailyTitle">每日推荐</div>
        <div class="sec-link" id="shuffle">换一批 ↻</div></div>
      <div class="ctx-chips" id="ctxChips" hidden></div>
      <div class="hscroll" id="dailyScroll"></div>

      <div class="sec-head" style="margin-top:18px"><div class="sec-title">推荐艺人</div>
        <div class="sec-link">查看全部 ›</div></div>
      <div class="hscroll" id="artistScroll"></div>
    </div>

    <!-- 排行榜 -->
    <div class="panel" data-panel="rank">
      <div class="charts">
        <div class="chart-col">
          <div class="sec-head" style="margin:10px 10px 4px"><div class="sec-title">最多播放</div></div>
          <div class="list" id="topList"></div>
        </div>
        <div class="chart-col">
          <div class="sec-head" style="margin:10px 10px 4px"><div class="sec-title">我的最爱 ★</div></div>
          <div class="list" id="favList"></div>
        </div>
      </div>
    </div>

    <!-- 歌手 -->
    <div class="panel" data-panel="artist">
      <div class="sec-head"><div class="sec-title">推荐歌手</div><div class="sec-link">查看全部 ›</div></div>
      <div class="grid-artist" id="artistGrid"></div>
    </div>

    <!-- 推荐专辑 -->
    <div class="panel" data-panel="album">
      <div class="sec-head"><div class="sec-title">推荐专辑</div><div class="sec-link">查看全部 ›</div></div>
      <div class="sub-note">从你的曲库里随机挑出的专辑 · 帮你重新发现</div>
      <div class="grid-album" id="albumGrid"></div>
    </div>
  </main>

  <!-- ═══ Player Bar ═══ -->
  <div class="player">
    <div class="pl-song">
      <div class="cv">🎧</div>
      <div style="min-width:0">
        <div class="tt">晴天</div><div class="ar">周杰伦</div>
      </div>
    </div>
    <div class="pl-mid">
      <div class="pl-ctrl">
        <div class="b" title="播放模式">🔁</div>
        <div class="b" title="上一首">⏮</div>
        <div class="b main" id="playBtn" title="播放/暂停">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
        <div class="b" title="下一首">⏭</div>
        <div class="b" title="收藏">🤍</div>
      </div>
      <div class="pl-prog">
        <span class="tm">1:24</span>
        <div class="pl-track"><div class="pl-fill"></div></div>
        <span class="tm">3:50</span>
      </div>
    </div>
    <div class="pl-vol">
      <svg viewBox="0 0 24 24"><path d="M3 10v4h4l5 5V5L7 10H3zm13.5 2a4.5 4.5 0 00-2.5-4v8a4.5 4.5 0 002.5-4z"/></svg>
      <div class="vt"><div class="vf"></div></div>
    </div>
  </div>
</div>

<script>
  const $ = s => document.querySelector(s), $$ = s => [...document.querySelectorAll(s)];
  const G = ['#7C5CFF','#FF7AAE','#5CE1E6','#FFB35C','#9D86FF','#62D2A2'];
  const coverBg = s => `linear-gradient(135deg, ${G[Math.abs(hash(s))%G.length]}55, ${G[(Math.abs(hash(s))+2)%G.length]}33)`;
  const glyph = s => s.slice(-1);
  function hash(s){let h=0;for(const c of s)h=(h*31+c.charCodeAt(0))>>>0;return h;}
  function play(t,a){ console.log('▶ play:', t, a); }

  let aiMode = false;
  const CTX = [['天气','雨天'],['日期','周六'],['时段','深夜'],['节日','万圣节前夜']];
  const daily = [
    ["晴天","周杰伦"],["孤勇者","陈奕迅"],["夜的第七章","周杰伦"],["光年之外","邓紫棋"],
    ["演员","薛之谦"],["修炼爱情","林俊杰"],["成都","赵雷"],["董小姐","宋冬野"]
  ];
  const artists = [
    ["周杰伦",42],["陈奕迅",38],["邓紫棋",31],["林俊杰",27],["薛之谦",24],["赵雷",19],
    ["朴树",16],["毛不易",15],["李健",14],["宋冬野",12],["陈鸿宇",9],["马頔",8]
  ];
  const albums = [
    ["叶惠美","周杰伦"],["新的心跳","邓紫棋"],["绅士","薛之谦"],["因你而在","林俊杰"],
    ["模特","李荣浩"],["猎户星座","朴树"],["伟大作品","周杰伦"],["毒蘑菇","毛不易"],
    ["安和桥北","宋冬野"],["无法长大","赵雷"],["edar","李荣浩"],["所有的酒","鹿先森乐队"]
  ];
  const topPlayed = [
    ["孤勇者","陈奕迅",12840],["夜的第七章","周杰伦",11205],["光年之外","邓紫棋",9870],
    ["演员","薛之谦",8520],["晴天","周杰伦",7990],["修炼爱情","林俊杰",7210],
    ["成都","赵雷",6680],["董小姐","宋冬野",5910]
  ];
  const favs = [
    ["理想","赵雷"],["南山南","马頔"],["董小姐","宋冬野"],["斑马斑马","宋冬野"],
    ["成都","赵雷"],["春风十里","鹿先森乐队"],["潮汐","李健"],["理想三旬","陈鸿宇"]
  ];

  /* ── Hero ── */
  const HERO = {
    off:[
      {cls:'b0', tag:'每日歌单 · 每天 0 点更新', title:'今日随机歌单',
       desc:'从你的 1280 首曲库随机精选 20 首'},
      {cls:'b1', tag:'我的最爱 · 你标星的歌', title:'收藏夹精选',
       desc:'你手动标星收藏的歌曲合集'},
      {cls:'b2', tag:'最常播放 · 你的循环', title:'循环最多次的歌',
       desc:'依据本地播放记录生成的榜单'}
    ],
    on:[
      {cls:'b3', tag:'AI 为你推荐 · 情境生成', title:'雨天 · 周六深夜',
       desc:'结合你的听歌习惯与当前天气、时段，从曲库精选 20 首'}
    ]
  };
  let heroIdx=0, heroTimer=null;
  let cardsPerView=2; /* PC 宽屏一次显示 2 张 */
  function buildHero(){
    const track=$("#heroTrack"), dots=$("#heroDots");
    const arr = aiMode ? [...HERO.on, ...HERO.off] : HERO.off;
    track.innerHTML=''; dots.innerHTML='';
    arr.forEach((s,i)=>{
      const d=document.createElement('div'); d.className='slide '+s.cls;
      d.innerHTML='<div class="glow"></div>'
        + '<div class="s-inner"><div class="tag">'+s.tag+'</div><div class="h-title">'+s.title+'</div>'
        + '<div class="h-desc">'+s.desc+'</div>'
        + '<div class="play-fab"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>';
      d.querySelector('.play-fab').onclick=e=>{ e.stopPropagation(); play(s.title,'精选'); };
      track.appendChild(d);
      const dt=document.createElement('div'); dt.className='dot'+(i===0?' active':'');
      dt.dataset.i=i; dt.onclick=()=>goHero(i); dots.appendChild(dt);
    });
    heroIdx=0; applyHeroPos();
    if(heroTimer) clearInterval(heroTimer);
    heroTimer=setInterval(()=>goHero(heroIdx+1),5000);
  }
  function applyHeroPos(){
    const track=$("#heroTrack");
    const slideW = track.querySelector('.slide')?.offsetWidth || (track.offsetWidth/2 - 9);
    track.style.transform='translateX(-'+(heroIdx*slideW)+'px)';
    $$('.hero-track .slide').forEach((el,i)=>el.classList.toggle('active',i===heroIdx));
    $$('#heroDots .dot').forEach((d,k)=>d.classList.toggle('active',k===heroIdx));
  }
  function goHero(i){
    const n=$$('#heroDots .dot').length;
    if(!n) return;
    heroIdx=(i%n+n)%n; applyHeroPos();
  }

  /* ── Renders ── */
  function renderDaily(){
    const w=$('#dailyScroll'); w.innerHTML='';
    daily.forEach(([t,a])=>{
      const el=document.createElement('div'); el.className='daily-card';
      el.innerHTML=`<div class="c-cover" style="background:${coverBg(t)}"><span class="glyph">${glyph(t)}</span>
        <div class="c-play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>
        <div class="t">${t}</div><div class="a">${a}</div>`;
      el.onclick=()=>play(t,a); w.appendChild(el);
    });
  }
  function renderArtistsRow(){
    const w=$('#artistScroll'); w.innerHTML='';
    artists.forEach(([n,c])=>{
      const el=document.createElement('div'); el.className='artist-card';
      el.innerHTML=`<div class="av" style="background:${coverBg(n)}"><span class="glyph">${glyph(n)}</span></div>
        <div class="n">${n}</div><div class="c">${c} 首</div>`;
      el.onclick=()=>play(n,'艺人'); w.appendChild(el);
    });
  }
  function renderArtistsGrid(){
    const g=$('#artistGrid'); g.innerHTML='';
    artists.forEach(([n,c])=>{
      const el=document.createElement('div'); el.className='artist-card';
      el.innerHTML=`<div class="av" style="background:${coverBg(n)}"><span class="glyph">${glyph(n)}</span></div>
        <div class="n">${n}</div><div class="c">${c} 首</div>`;
      el.onclick=()=>play(n,'艺人'); g.appendChild(el);
    });
  }
  function renderAlbums(){
    const g=$('#albumGrid'); g.innerHTML='';
    albums.forEach(([t,a])=>{
      const el=document.createElement('div'); el.className='album-card';
      el.innerHTML=`<div class="album-cover" style="background:${coverBg(t)}"><span class="glyph">${glyph(t)}</span></div>
        <div class="t">${t}</div><div class="a">${a}</div>`;
      el.onclick=()=>play(t,a); g.appendChild(el);
    });
  }
  function rowHTML([t,a],i,fav){
    const rank=fav?`<div class="rank fav">★</div>`:`<div class="rank ${i<3?'r'+(i+1):''}">${i+1}</div>`;
    return `<div class="row">${rank}
      <div class="mini-cover" style="background:${coverBg(t)}"><span class="glyph">${glyph(t)}</span></div>
      <div class="meta"><div class="t">${t}</div><div class="s">${a}</div></div>
      <div class="right"><span>${fav?'已收藏':'本地榜'}</span>
        <div class="play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div></div>`;
  }
  function renderTop(){ const w=$('#topList'); w.innerHTML=''; topPlayed.forEach((r,i)=>{
    const el=document.createElement('div'); el.innerHTML=rowHTML(r,i,false);
    el.firstChild.onclick=()=>play(r[0],r[1]); w.appendChild(el.firstChild);}); }
  function renderFav(){ const w=$('#favList'); w.innerHTML=''; favs.forEach((r,i)=>{
    const el=document.createElement('div'); el.innerHTML=rowHTML(r,i,true);
    el.firstChild.onclick=()=>play(r[0],r[1]); w.appendChild(el.firstChild);}); }

  /* ── AI mode ── */
  function applyAiMode(){
    $('#dailyTitle').textContent = aiMode ? 'AI 为你推荐' : '每日推荐';
    $('#shuffle').textContent = aiMode ? '重新生成 ↻' : '换一批 ↻';
    const cc=$('#ctxChips');
    if(aiMode){ cc.hidden=false; cc.innerHTML=CTX.map(([k,v])=>`<span class="ctx-chip">${k} <b>${v}</b></span>`).join(''); }
    else { cc.hidden=true; cc.innerHTML=''; }
    buildHero();
  }

  /* ── Tabs ── */
  function switchCat(cat){
    $$('#tabs .tab').forEach(x=>x.classList.toggle('active', x.dataset.cat===cat));
    $$('.panel').forEach(p=>p.classList.toggle('show', p.dataset.panel===cat));
    if(cat==='artist') renderArtistsGrid();
  }
  $$('#tabs .tab').forEach(t=>t.onclick=()=>switchCat(t.dataset.cat));

  /* ── Wiring ── */
  $('#aiSwitch').onclick=function(){ this.classList.toggle('on'); aiMode=this.classList.contains('on'); applyAiMode(); };
  $('#shuffle').onclick=()=>{ if(aiMode){ console.log('regenerate AI playlist'); } else { daily.sort(()=>Math.random()-0.5); renderDaily(); } };
  $('#themeBtn').onclick=function(){
    const d=document.documentElement; const dark=d.dataset.theme!=='light';
    d.dataset.theme = dark ? 'light' : 'dark'; this.textContent = dark ? '☀️' : '🌙';
  };
  $('#playBtn').onclick=function(){
    const svg=this.querySelector('svg'); const playing=svg.dataset.p==='1';
    svg.dataset.p=playing?'0':'1';
    svg.innerHTML = playing ? '<path d="M8 5v14l11-7z"/>' : '<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>';
  };

  $('#heroPrev').onclick=()=>goHero(heroIdx-1);
  $('#heroNext').onclick=()=>goHero(heroIdx+1);
  /* init */
  buildHero(); renderDaily(); renderArtistsRow(); renderAlbums(); renderTop(); renderFav();
  window.addEventListener('resize',applyHeroPos);

  // ════ 问候语（随时间段变化，与手机端一致）════
  function updateGreet(){
    const h=new Date().getHours();
    const g = h<6?'凌晨好':h<12?'早上好':h<18?'下午好':'晚上好';
    $('#greet').textContent=`${g}，为你精选今日好歌`;
  }
  updateGreet(); setInterval(updateGreet,30000);
</script>
</body>
</html>
